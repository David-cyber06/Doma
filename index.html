<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>♫ Doma - Josean Log | Visualizador Musical ♫</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0008;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
            user-select: none;
        }

        .container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            /* Todo más arriba */
            align-items: center;
            background: #0a0008;
            transition: background 0.05s ease;
            padding: 10px 20px 20px;
            overflow: hidden;
            padding-top: 15px;
        }

        .particulas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .particula {
            position: absolute;
            border-radius: 50%;
            pointer-events: none;
            animation: particulaVolar 3s ease-out forwards;
            opacity: 0;
        }

        @keyframes particulaVolar {
            0% {
                opacity: 1;
                transform: translate(0, 0) scale(1);
            }
            100% {
                opacity: 0;
                transform: translate(var(--dx), var(--dy)) scale(0);
            }
        }

        /* ===== LETRA - MÁS ARRIBA ===== */
        .letra-container {
            width: 90%;
            max-width: 800px;
            text-align: center;
            min-height: 80px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 4px 20px 6px;
            position: relative;
            z-index: 1;
            margin-top: 0;
        }

        .titulo {
            color: #00ffff;
            font-size: 17px;
            font-weight: bold;
            letter-spacing: 2px;
            margin-bottom: 2px;
            text-shadow: 0 0 20px rgba(0, 255, 255, 0.3);
            transition: all 0.3s ease;
            min-height: 30px;
            z-index: 1;
        }

        .letra {
            font-size: 24px;
            font-weight: bold;
            text-align: center;
            min-height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.1s ease;
            padding: 4px;
            line-height: 1.2;
            text-shadow: 0 0 30px rgba(255, 255, 255, 0.1);
            color: #fff;
            z-index: 1;
            position: relative;
        }

        .letra .brillo {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 120%;
            height: 120%;
            background: radial-gradient(circle, rgba(255, 100, 150, 0.3), transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            animation: brilloLetra 0.5s ease-in-out infinite alternate;
            display: none;
        }

        @keyframes brilloLetra {
            0% {
                transform: translate(-50%, -50%) scale(0.8);
                opacity: 0.3;
            }
            100% {
                transform: translate(-50%, -50%) scale(1.5);
                opacity: 0.8;
            }
        }

        /* ===== GRÁFICO DE BARRAS - MÁS GRANDE ===== */
        .grafico-container {
            width: 92%;
            max-width: 920px;
            position: relative;
            z-index: 1;
            margin-top: 2px;
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 0;
        }

        .grafico-container .ejes {
            position: relative;
            width: 100%;
            height: 100%;
            min-height: 280px;
            /* Más grande */
            max-height: 450px;
            flex: 1;
            margin-left: 50px;
        }

        /* Eje Y (Intensidad) */
        .eje-y {
            position: absolute;
            left: -48px;
            top: 0;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            color: #666;
            font-size: 9px;
            font-family: 'Segoe UI', monospace;
            letter-spacing: 0.5px;
            text-align: right;
            padding-right: 6px;
            width: 38px;
        }
        .eje-y span {
            opacity: 0.5;
        }

        .eje-y-titulo {
            position: absolute;
            left: -52px;
            top: 50%;
            transform: translateY(-50%) rotate(-90deg);
            color: #555;
            font-size: 11px;
            letter-spacing: 2px;
            font-family: 'Segoe UI', sans-serif;
            white-space: nowrap;
            opacity: 0.6;
            font-weight: 300;
        }

        /* Barras */
        .barras-wrapper {
            position: absolute;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            gap: 4px;
            padding: 0 4px;
            border-left: 1px solid rgba(255, 255, 255, 0.08);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }

        .barra {
            flex: 1;
            height: 3px;
            min-height: 2px;
            border-radius: 3px 3px 0 0;
            transition: height 0.04s ease, background 0.04s ease;
            background: cyan;
            max-width: 28px;
        }

        /* Eje X */
        .eje-x {
            display: flex;
            justify-content: space-between;
            padding: 4px 8px 0 8px;
            margin-left: 50px;
            color: #555;
            font-size: 9px;
            font-family: 'Segoe UI', monospace;
            letter-spacing: 0.5px;
        }
        .eje-x span {
            opacity: 0.5;
        }

        .eje-x-titulo {
            text-align: center;
            color: #555;
            font-size: 11px;
            letter-spacing: 2px;
            font-family: 'Segoe UI', sans-serif;
            opacity: 0.6;
            font-weight: 300;
            margin-top: 1px;
            margin-left: 50px;
        }

        /* ===== INFO Y CONTROLES - MÁS ABAJO ===== */
        .info {
            color: #888;
            font-size: 13px;
            margin-top: 12px;
            letter-spacing: 2px;
            text-align: center;
            z-index: 1;
            position: relative;
        }
        .info strong {
            color: #ff6b6b;
        }

        .tiempo {
            color: #aaa;
            font-size: 13px;
            margin-top: 2px;
            letter-spacing: 1px;
            z-index: 1;
            position: relative;
        }

        .controles {
            margin-top: 10px;
            margin-bottom: 8px;
            display: flex;
            gap: 14px;
            align-items: center;
            flex-wrap: wrap;
            justify-content: center;
            z-index: 1;
            position: relative;
        }

        .btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #ddd;
            padding: 8px 24px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.3s ease;
            font-family: inherit;
            letter-spacing: 1px;
            z-index: 1;
        }

        .btn:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.2);
            transform: scale(1.02);
        }

        .btn:active {
            transform: scale(0.95);
        }

        .btn-primary {
            background: rgba(255, 107, 107, 0.15);
            border-color: rgba(255, 107, 107, 0.3);
            color: #ff6b6b;
        }

        .btn-primary:hover {
            background: rgba(255, 107, 107, 0.25);
            border-color: rgba(255, 107, 107, 0.5);
        }

        .btn-audio {
            background: rgba(0, 255, 255, 0.1);
            border-color: rgba(0, 255, 255, 0.2);
            color: #00ffff;
            min-width: 54px;
        }

        .btn-audio:hover {
            background: rgba(0, 255, 255, 0.2);
            border-color: rgba(0, 255, 255, 0.4);
        }

        /* ===== CARGA ===== */
        .cargando {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #0a0008;
            z-index: 1000;
            color: #d4a0d4;
            font-size: 20px;
            letter-spacing: 3px;
            flex-direction: column;
            gap: 20px;
        }
        .cargando .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(180, 80, 180, 0.1);
            border-top: 3px solid #d4a0d4;
            border-radius: 50%;
            animation: girar 1s linear infinite;
        }
        @keyframes girar {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }
        .cargando.oculto {
            display: none;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 600px) {
            .container {
                padding: 8px 12px 12px;
                padding-top: 8px;
            }
            .letra {
                font-size: 18px;
                min-height: 40px;
            }
            .titulo {
                font-size: 13px;
                min-height: 24px;
            }
            .letra-container {
                min-height: 60px;
                padding: 2px 12px 4px;
            }
            .grafico-container .ejes {
                min-height: 200px;
                max-height: 320px;
                margin-left: 35px;
            }
            .eje-y {
                left: -38px;
                width: 30px;
                font-size: 8px;
            }
            .eje-y-titulo {
                left: -42px;
                font-size: 9px;
            }
            .eje-x {
                margin-left: 35px;
                font-size: 8px;
                padding: 2px 4px 0 4px;
            }
            .eje-x-titulo {
                margin-left: 35px;
                font-size: 9px;
            }
            .barras-wrapper {
                gap: 3px;
                padding: 0 3px;
            }
            .barra {
                max-width: 18px;
                min-height: 2px;
            }
            .btn {
                padding: 6px 16px;
                font-size: 11px;
            }
            .controles {
                gap: 8px;
                margin-top: 6px;
                margin-bottom: 4px;
            }
            .info {
                font-size: 11px;
                margin-top: 8px;
            }
            .tiempo {
                font-size: 11px;
                margin-top: 1px;
            }
        }

        @media (max-width: 400px) {
            .container {
                padding: 4px 8px 8px;
                padding-top: 4px;
            }
            .letra {
                font-size: 14px;
                min-height: 32px;
            }
            .titulo {
                font-size: 11px;
                min-height: 20px;
            }
            .letra-container {
                min-height: 48px;
                padding: 1px 8px 2px;
            }
            .grafico-container .ejes {
                min-height: 150px;
                max-height: 250px;
                margin-left: 30px;
            }
            .eje-y {
                left: -32px;
                width: 26px;
                font-size: 7px;
            }
            .eje-y-titulo {
                left: -36px;
                font-size: 8px;
            }
            .eje-x {
                margin-left: 30px;
                font-size: 7px;
            }
            .eje-x-titulo {
                margin-left: 30px;
                font-size: 8px;
            }
            .barras-wrapper {
                gap: 2px;
                padding: 0 2px;
            }
            .barra {
                max-width: 12px;
                min-height: 2px;
            }
            .info {
                font-size: 10px;
                margin-top: 6px;
            }
            .controles {
                margin-top: 4px;
                margin-bottom: 2px;
                gap: 6px;
            }
            .btn {
                padding: 5px 12px;
                font-size: 10px;
            }
        }

        ::-webkit-scrollbar {
            width: 0px;
        }
    </style>
</head>
<body>

    <div class="cargando" id="cargando">
        <div class="spinner"></div>
        <span>🎵 Cargando canción...</span>
    </div>

    <div class="particulas-container" id="particulasContainer"></div>

    <div class="container" id="container">

        <!-- ===== LETRA - MÁS ARRIBA ===== -->
        <div class="letra-container">
            <div class="titulo" id="titulo">♫ Doma - Josean Log ♫</div>
            <div class="letra" id="letra">
                ❤ De corazones tienes colección ❤
                <div class="brillo" id="brilloLetra"></div>
            </div>
        </div>

        <!-- ===== GRÁFICO - MÁS GRANDE ===== -->
        <div class="grafico-container">
            <div class="ejes" id="ejesGrafico">
                <div class="eje-y">
                    <span>1.0</span>
                    <span>0.75</span>
                    <span>0.5</span>
                    <span>0.25</span>
                    <span>0.0</span>
                </div>
                <div class="eje-y-titulo">Intensidad</div>
                <div class="barras-wrapper" id="barrasContainer"></div>
            </div>
            <div class="eje-x">
                <span>0</span>
                <span>10</span>
                <span>20</span>
                <span>30</span>
                <span>40</span>
                <span>50</span>
                <span>60</span>
                <span>70</span>
                <span>80</span>
                <span>90</span>
                <span>100</span>
            </div>
            <div class="eje-x-titulo">Frecuencia</div>
        </div>

        <!-- ===== INFO - MÁS ABAJO ===== -->
        <div class="info">
            ⏱ <strong id="tiempoRestante">80.0</strong>s restantes
        </div>
        <div class="tiempo" id="modoTexto">🎵</div>

        <div class="controles">
            <button class="btn btn-primary" id="btnReiniciar">🔄 Reiniciar</button>
            <button class="btn btn-audio" id="btnAudio">🔊</button>
        </div>

    </div>

    <script>
        // ============================================================
        // CONFIGURACIÓN
        // ============================================================
        const DURACION_TOTAL = 80;
        const NUM_BARRAS = 40;
        const INICIO_AUDIO = 80;
        const MODO_EXPLOSIVO = 40;

        // ALTURA MÁXIMA DE BARRAS EN MODO EXPLOSIVO (BAJADA PARA VER CORAZÓN)
        const ALTURA_MAXIMA_EXPLOSIVO = 120;
        const ALTURA_MAXIMA_NORMAL = 200;

        const LETRAS = [
            { tiempo: 0.0, texto: "❤ De corazones tienes colección ❤" },
            { tiempo: 3.5, texto: " ☼☽ Ya va amanecer ☀︎︎" },
            { tiempo: 7.5, texto: "✰ Y sigo en esta encrucijada ✰" },
            { tiempo: 10.5, texto: "✰ Misterio de mujer ✰" },
            { tiempo: 13.0, texto: "✰ Solo será cuestión de tiempo ✰" },
            { tiempo: 17.0, texto: ".ᐟ.ᐟ Debo interpretar tus gritos, tus llamadas .ᐟ.ᐟ" },
            { tiempo: 22.0, texto: "☔︎︎ Tus caricias entre cortadas ☔︎︎" },
            { tiempo: 26.0, texto: "❤ Y tus arranques de pasión ❤" },
            { tiempo: 31.0, texto: ".ᐟ.ᐟ Debo buscar dentro de tanto desperfecto .ᐟ.ᐟ" },
            { tiempo: 37.5, texto: "☔︎︎ La moraleja de este cuento ☔︎︎" },
            { tiempo: 40.0, texto: "➶➶ DEBO DOMAR TU CORAZÓN ➶➶" }
        ];

        // ============================================================
        // DOM
        // ============================================================
        const container = document.getElementById('container');
        const letraEl = document.getElementById('letra');
        const brilloLetra = document.getElementById('brilloLetra');
        const tituloEl = document.getElementById('titulo');
        const tiempoRestanteEl = document.getElementById('tiempoRestante');
        const modoTextoEl = document.getElementById('modoTexto');
        const barrasContainer = document.getElementById('barrasContainer');
        const particulasContainer = document.getElementById('particulasContainer');
        const btnReiniciar = document.getElementById('btnReiniciar');
        const btnAudio = document.getElementById('btnAudio');
        const cargando = document.getElementById('cargando');
        const ejesGrafico = document.getElementById('ejesGrafico');

        // ============================================================
        // AUDIO
        // ============================================================
        const audio = new Audio('music/doma.mp3');
        audio.loop = true;
        audio.volume = 0.7;
        let audioListo = false;

        audio.addEventListener('canplaythrough', () => {
            audioListo = true;
            cargando.classList.add('oculto');
            console.log('✅ Audio cargado');
        });

        audio.addEventListener('error', () => {
            console.warn('⚠️ No se cargó el audio');
            cargando.classList.add('oculto');
        });

        audio.load();

        // ============================================================
        // CREAR BARRAS
        // ============================================================
        let barras = [];

        function crearBarras() {
            barrasContainer.innerHTML = '';
            barras = [];
            for (let i = 0; i < NUM_BARRAS; i++) {
                const barra = document.createElement('div');
                barra.className = 'barra';
                barra.style.height = '3px';
                barrasContainer.appendChild(barra);
                barras.push(barra);
            }
        }
        crearBarras();

        // ============================================================
        // GENERAR CORAZÓN (con intensidad reducida en modo explosivo)
        // ============================================================
        function generarCorazon(ancho, latido, explosivo) {
            const alturas = new Array(ancho).fill(0.05);
            const centro = Math.floor(ancho / 2);

            const formaCorazon = [0.2, 0.3, 0.5, 0.7, 0.85, 0.95, 1.0, 0.95, 0.85, 0.7, 0.5, 0.3, 0.2];
            const inicio = centro - Math.floor(formaCorazon.length / 2);

            for (let i = 0; i < formaCorazon.length; i++) {
                const idx = inicio + i;
                if (idx >= 0 && idx < ancho) {
                    alturas[idx] = Math.max(alturas[idx], formaCorazon[i]);
                }
            }

            // INTENSIDAD REDUCIDA en modo explosivo para que se vea el corazón
            const intensidadLatido = explosivo ?
                0.5 + 0.5 * Math.abs(Math.sin(latido * 12)) :
                0.5 + 0.5 * Math.sin(latido * 10);

            for (let i = 0; i < ancho; i++) {
                if (alturas[i] < 0.3) {
                    const distancia = Math.abs(i - centro) / (ancho / 2);
                    const frecuencia = explosivo ? 14 : 12;
                    const salto = (0.6 + 0.4 * Math.sin(latido * frecuencia - i * 0.5)) * (1 - distancia * 0.5);
                    alturas[i] = Math.max(alturas[i], salto);
                }
            }

            for (let i = 0; i < ancho; i++) {
                alturas[i] = alturas[i] * (0.3 + 0.7 * intensidadLatido);
            }

            // CAOS REDUCIDO en modo explosivo
            const factorCaos = explosivo ? 0.35 : 0.2;
            for (let i = 0; i < ancho; i++) {
                alturas[i] += factorCaos * Math.abs(Math.sin(latido * 20 + i * 2)) * (Math.random() * 0.5 + 0.5);
            }

            return alturas.map(a => Math.min(Math.max(a, 0.05), 1));
        }

        // ============================================================
        // COLOR
        // ============================================================
        function getColor(altura, explosivo) {
            if (explosivo) {
                const r = Math.min(1, 0.5 + altura * 0.7);
                const g = Math.min(1, 0.1 + altura * 0.4);
                const b = Math.min(1, 0.1 + altura * 0.25);
                return `rgb(${Math.floor(r * 255)}, ${Math.floor(g * 255)}, ${Math.floor(b * 255)})`;
            } else {
                const hue = 200 + altura * 180;
                return `hsl(${hue}, 90%, ${30 + altura * 50}%)`;
            }
        }

        // ============================================================
        // PARTÍCULAS
        // ============================================================
        function crearParticula(x, y, color) {
            const particula = document.createElement('div');
            particula.className = 'particula';
            const size = 4 + Math.random() * 10;
            const angulo = Math.random() * 2 * Math.PI;
            const distancia = 100 + Math.random() * 300;
            const dx = Math.cos(angulo) * distancia;
            const dy = Math.sin(angulo) * distancia - 100;

            particula.style.width = size + 'px';
            particula.style.height = size + 'px';
            particula.style.left = (x - size / 2) + 'px';
            particula.style.top = (y - size / 2) + 'px';
            particula.style.setProperty('--dx', dx + 'px');
            particula.style.setProperty('--dy', dy + 'px');
            particula.style.background = color;
            particula.style.boxShadow = `0 0 ${size * 2}px ${color}`;
            particula.style.animationDuration = (1.5 + Math.random() * 2) + 's';

            particulasContainer.appendChild(particula);

            setTimeout(() => {
                particula.remove();
            }, 4000);
        }

        function explosionParticulas(centroX, centroY, cantidad) {
            const colores = [
                '#ff6b6b', '#ff4757', '#ff6348', '#ff7f50',
                '#ff9ff3', '#f368e0', '#ff6b81', '#ff4757',
                '#ffda79', '#ffb142', '#ff9f43', '#ff6b6b',
                '#ff00ff', '#ff1493', '#ff69b4', '#ff4081'
            ];

            for (let i = 0; i < cantidad; i++) {
                const color = colores[Math.floor(Math.random() * colores.length)];
                const x = centroX + (Math.random() - 0.5) * 100;
                const y = centroY + (Math.random() - 0.5) * 100;
                crearParticula(x, y, color);
            }
        }

        // ============================================================
        // ESTADO
        // ============================================================
        let tiempoInicio = 0;
        let reproduciendo = false;
        let animacionId = null;
        let pausado = false;
        let frameCounter = 0;
        let reiniciando = false;

        // ============================================================
        // ACTUALIZAR ANIMACIÓN
        // ============================================================
        function actualizarAnimacion(timestamp) {
            if (!reproduciendo || pausado) {
                animacionId = requestAnimationFrame(actualizarAnimacion);
                return;
            }

            frameCounter++;
            const tiempoActual = (Date.now() - tiempoInicio) / 1000;

            if (tiempoActual > DURACION_TOTAL) {
                tiempoInicio = Date.now();
                if (audio.paused && audioEncendido) {
                    audio.currentTime = INICIO_AUDIO;
                    audio.play().catch(() => {});
                }
                return;
            }

            const tiempoRestante = Math.max(0, DURACION_TOTAL - tiempoActual);
            const explosivo = tiempoActual >= MODO_EXPLOSIVO;

            // ===== FONDO =====
            let r, g, b;
            if (!explosivo) {
                r = 0.05 + 0.1 * Math.pow(Math.sin(tiempoActual * 0.5), 2);
                g = 0.05 + 0.1 * Math.pow(Math.sin(tiempoActual * 0.6), 2);
                b = 0.15 + 0.15 * Math.pow(Math.sin(tiempoActual * 0.7), 2);
                if (Math.sin(tiempoActual * 4) > 0.95) r = Math.min(0.3, r + 0.15);
                if (Math.sin(tiempoActual * 4.2) > 0.95) b = Math.min(0.4, b + 0.15);
            } else {
                const pulso = Math.sin(tiempoActual * 3) * 0.5 + 0.5;
                r = 0.3 + 0.7 * pulso;
                g = 0.05 + 0.4 * Math.pow(Math.sin(tiempoActual * 2.5 + 1), 2);
                b = 0.05 + 0.4 * Math.pow(Math.sin(tiempoActual * 2.8 + 2), 2);

                if (Math.sin(tiempoActual * 12) > 0.9) r = Math.min(1, r + 0.5);
                if (Math.sin(tiempoActual * 13) > 0.9) g = Math.min(0.8, g + 0.5);
                if (Math.sin(tiempoActual * 11) > 0.9) {
                    r = Math.min(1, r + 0.4);
                    b = Math.min(1, b + 0.4);
                }
                if (Math.sin(tiempoActual * 20) > 0.95) {
                    r = 1;
                    g = 1;
                    b = 1;
                }
            }

            const bgColor = `rgb(${Math.floor(r * 255)}, ${Math.floor(g * 255)}, ${Math.floor(b * 255)})`;
            container.style.background = bgColor;

            // ===== LETRA =====
            let textoActual = '';
            for (let i = LETRAS.length - 1; i >= 0; i--) {
                if (tiempoActual >= LETRAS[i].tiempo) {
                    textoActual = LETRAS[i].texto;
                    break;
                }
            }

            letraEl.textContent = textoActual;

            if (explosivo) {
                const hue = (tiempoActual * 60) % 360;
                const lig = 55 + 20 * Math.sin(tiempoActual * 5);
                letraEl.style.color = `hsl(${hue}, 100%, ${lig}%)`;
                letraEl.style.textShadow = `
                    0 0 30px hsla(${hue}, 100%, 70%, 0.5),
                    0 0 60px hsla(${hue + 30}, 100%, 60%, 0.3),
                    0 0 100px hsla(${hue + 60}, 100%, 50%, 0.2)
                `;
                letraEl.style.transform = `scale(${1 + 0.03 * Math.sin(tiempoActual * 8)})`;

                brilloLetra.style.display = 'block';
                brilloLetra.style.background = `radial-gradient(circle, hsla(${hue}, 100%, 70%, 0.4), transparent 70%)`;

                tituloEl.style.color = '#ff6b6b';
                tituloEl.style.textShadow = `
                    0 0 30px rgba(255, 107, 107, 0.5),
                    0 0 60px rgba(255, 107, 107, 0.2)
                `;
            } else {
                const hue = 180 + (tiempoActual * 30) % 60;
                letraEl.style.color = `hsl(${hue}, 100%, 70%)`;
                letraEl.style.textShadow = `0 0 40px hsla(${hue}, 100%, 70%, 0.2)`;
                letraEl.style.transform = 'scale(1)';
                brilloLetra.style.display = 'none';
                tituloEl.style.color = '#00ffff';
                tituloEl.style.textShadow = '0 0 30px rgba(0, 255, 255, 0.3)';
            }

            // ===== BARRAS =====
            let alturas;
            if (explosivo) {
                const latido = tiempoActual;
                alturas = generarCorazon(NUM_BARRAS, latido, true);
                // Menos caos adicional
                for (let i = 0; i < NUM_BARRAS; i++) {
                    alturas[i] += 0.25 * Math.abs(Math.sin(tiempoActual * 12 + i * 2.5)) * (Math.random() * 0.4 + 0.6);
                    alturas[i] = Math.min(Math.max(alturas[i], 0.05), 1);
                }
            } else {
                alturas = [];
                for (let i = 0; i < NUM_BARRAS; i++) {
                    const freq = Math.abs(Math.sin(i * 0.3 + tiempoActual * 8));
                    const variacion = Math.random() * 0.3;
                    let altura = freq * (0.5 + 0.5 * Math.sin(tiempoActual * 3)) + variacion * 0.2;
                    altura = Math.min(Math.max(altura, 0.05), 1);
                    alturas.push(altura);
                }
            }

            // Altura máxima según modo
            const alturaMax = explosivo ? ALTURA_MAXIMA_EXPLOSIVO : ALTURA_MAXIMA_NORMAL;

            // Obtener altura del gráfico para escalar correctamente
            const ejesHeight = ejesGrafico.clientHeight || 300;

            for (let i = 0; i < NUM_BARRAS; i++) {
                const altura = alturas[i] || 0.05;
                const barra = barras[i];
                // Escalar al tamaño del gráfico
                const alturaPx = Math.max(2, altura * (alturaMax / 200) * ejesHeight * 0.85);
                barra.style.height = alturaPx + 'px';
                barra.style.background = getColor(altura, explosivo);
                if (explosivo) {
                    barra.style.boxShadow = `0 0 ${6 + altura * 12}px ${getColor(altura, true)}`;
                } else {
                    barra.style.boxShadow = 'none';
                }
            }

            // ===== PARTÍCULAS =====
            if (explosivo && frameCounter % 3 === 0) {
                const ancho = window.innerWidth;
                const alto = window.innerHeight;
                const cx = ancho / 2;
                const cy = alto / 2;
                const cantidad = 4 + Math.floor(Math.random() * 8);
                const centroX = cx + (Math.random() - 0.5) * 200;
                const centroY = cy * 0.3 + (Math.random() - 0.5) * 100;
                explosionParticulas(centroX, centroY, cantidad);
            }

            if (explosivo) {
                if (frameCounter % 30 === 0) {
                    const cx = window.innerWidth / 2;
                    const cy = window.innerHeight / 2;
                    explosionParticulas(cx, cy * 0.3, 15 + Math.floor(Math.random() * 15));
                }
                if (frameCounter % 15 === 0) {
                    const x = Math.random() * window.innerWidth;
                    const y = Math.random() * window.innerHeight * 0.5;
                    explosionParticulas(x, y, 2 + Math.floor(Math.random() * 4));
                }
            }

            // ===== TIEMPO =====
            tiempoRestanteEl.textContent = tiempoRestante.toFixed(1);

            if (explosivo) {
                modoTextoEl.textContent = '❤🔥';
                modoTextoEl.style.color = '#ff6b6b';
                modoTextoEl.style.textShadow = '0 0 30px rgba(255, 107, 107, 0.5)';
                modoTextoEl.style.fontSize = '20px';
                tituloEl.textContent = `♫ TIEMPO RESTANTE: ${tiempoRestante.toFixed(1)}s ♫  ❤🔥❤🔥❤🔥❤🔥❤🔥`;
            } else {
                modoTextoEl.textContent = '🎵';
                modoTextoEl.style.color = '#888';
                modoTextoEl.style.textShadow = 'none';
                modoTextoEl.style.fontSize = '16px';
                tituloEl.textContent = `♫ TIEMPO RESTANTE: ${tiempoRestante.toFixed(1)}s ♫`;
            }

            animacionId = requestAnimationFrame(actualizarAnimacion);
        }

        // ============================================================
        // INICIAR
        // ============================================================
        function iniciar() {
            if (animacionId) {
                cancelAnimationFrame(animacionId);
            }
            tiempoInicio = Date.now();
            reproduciendo = true;
            pausado = false;
            frameCounter = 0;
            reiniciando = false;
            animacionId = requestAnimationFrame(actualizarAnimacion);
        }

        // ============================================================
        // REINICIAR
        // ============================================================
        function reiniciar() {
            if (reiniciando) return;
            reiniciando = true;

            if (animacionId) {
                cancelAnimationFrame(animacionId);
                animacionId = null;
            }

            tiempoInicio = Date.now();
            pausado = false;
            frameCounter = 0;

            audio.currentTime = INICIO_AUDIO;
            if (audioEncendido) {
                audio.play().catch(() => {});
            }

            container.style.background = '#0a0008';
            letraEl.style.color = '#fff';
            letraEl.style.transform = 'scale(1)';
            tituloEl.style.color = '#00ffff';
            tituloEl.style.textShadow = '0 0 30px rgba(0, 255, 255, 0.3)';
            tiempoRestanteEl.textContent = '80.0';
            modoTextoEl.textContent = '🎵';
            modoTextoEl.style.color = '#888';
            modoTextoEl.style.textShadow = 'none';
            modoTextoEl.style.fontSize = '16px';
            brilloLetra.style.display = 'none';

            particulasContainer.innerHTML = '';

            for (let i = 0; i < NUM_BARRAS; i++) {
                const barra = barras[i];
                barra.style.height = '3px';
                barra.style.background = 'cyan';
                barra.style.boxShadow = 'none';
            }

            reproduciendo = true;
            animacionId = requestAnimationFrame(actualizarAnimacion);

            setTimeout(() => {
                reiniciando = false;
            }, 100);

            console.log('🔄 Reiniciado correctamente');
        }

        // ============================================================
        // CONTROLES
        // ============================================================
        let audioEncendido = true;

        btnAudio.addEventListener('click', () => {
            if (audioEncendido) {
                audio.pause();
                audioEncendido = false;
                btnAudio.textContent = '🔇';
                pausado = true;
            } else {
                audio.currentTime = INICIO_AUDIO;
                audio.play().catch(() => {});
                audioEncendido = true;
                btnAudio.textContent = '🔊';
                pausado = false;
                if (!tiempoInicio) {
                    tiempoInicio = Date.now();
                }
            }
        });

        btnReiniciar.addEventListener('click', reiniciar);

        // ============================================================
        // INICIO
        // ============================================================
        console.log('♫ Doma - Josean Log | Visualizador Musical ♫');
        console.log(`🎵 Audio inicia en segundo ${INICIO_AUDIO}`);
        console.log('❤🔥 A los 40 segundos: modo explosivo (intensidad reducida)');
        console.log('🔄 Bucle infinito automático');

        iniciar();

        const intentarAudio = () => {
            if (audioListo) {
                audio.currentTime = INICIO_AUDIO;
                audio.play().catch(() => {});
            }
            document.removeEventListener('click', intentarAudio);
            document.removeEventListener('touchstart', intentarAudio);
        };

        document.addEventListener('click', intentarAudio);
        document.addEventListener('touchstart', intentarAudio);

        setTimeout(() => {
            if (audioListo) {
                audio.currentTime = INICIO_AUDIO;
                audio.play().catch(() => {});
            }
        }, 500);

        window.addEventListener('resize', () => {});
    </script>

</body>
