<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>♫ Doma - Josean Log | Visualizador Musical ♫</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0008;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
            user-select: none;
        }

        .container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: #0a0008;
            transition: background 0.1s ease;
            padding: 20px;
        }

        .letra-container {
            width: 90%;
            max-width: 800px;
            text-align: center;
            min-height: 120px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .titulo {
            color: #00ffff;
            font-size: 22px;
            font-weight: bold;
            letter-spacing: 2px;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(0, 255, 255, 0.3);
            transition: all 0.3s ease;
            min-height: 50px;
        }

        .letra {
            font-size: 32px;
            font-weight: bold;
            text-align: center;
            min-height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            padding: 10px;
            line-height: 1.4;
            text-shadow: 0 0 30px rgba(255, 255, 255, 0.1);
            color: #fff;
        }

        .barras-container {
            width: 90%;
            max-width: 900px;
            height: 250px;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            gap: 6px;
            padding: 20px;
            margin-top: 10px;
        }

        .barra {
            flex: 1;
            height: 5px;
            min-height: 5px;
            border-radius: 4px 4px 0 0;
            transition: height 0.05s ease;
            background: cyan;
            max-width: 30px;
        }

        .info {
            color: #888;
            font-size: 14px;
            margin-top: 15px;
            letter-spacing: 2px;
            text-align: center;
        }
        .info strong {
            color: #ff6b6b;
        }

        .tiempo {
            color: #aaa;
            font-size: 13px;
            margin-top: 5px;
            letter-spacing: 1px;
        }

        .controles {
            margin-top: 20px;
            display: flex;
            gap: 16px;
            align-items: center;
            flex-wrap: wrap;
            justify-content: center;
        }

        .btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #ddd;
            padding: 10px 28px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s ease;
            font-family: inherit;
            letter-spacing: 1px;
        }

        .btn:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.2);
            transform: scale(1.02);
        }

        .btn:active {
            transform: scale(0.95);
        }

        .btn-primary {
            background: rgba(255, 107, 107, 0.15);
            border-color: rgba(255, 107, 107, 0.3);
            color: #ff6b6b;
        }

        .btn-primary:hover {
            background: rgba(255, 107, 107, 0.25);
            border-color: rgba(255, 107, 107, 0.5);
        }

        .btn-audio {
            background: rgba(0, 255, 255, 0.1);
            border-color: rgba(0, 255, 255, 0.2);
            color: #00ffff;
            min-width: 60px;
        }

        .btn-audio:hover {
            background: rgba(0, 255, 255, 0.2);
            border-color: rgba(0, 255, 255, 0.4);
        }

        .cargando {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #0a0008;
            z-index: 1000;
            color: #d4a0d4;
            font-size: 20px;
            letter-spacing: 3px;
            flex-direction: column;
            gap: 20px;
        }
        .cargando .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(180, 80, 180, 0.1);
            border-top: 3px solid #d4a0d4;
            border-radius: 50%;
            animation: girar 1s linear infinite;
        }
        @keyframes girar {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .cargando.oculto {
            display: none;
        }

        @media (max-width: 600px) {
            .letra {
                font-size: 22px;
                min-height: 80px;
            }
            .titulo {
                font-size: 16px;
                min-height: 40px;
            }
            .barras-container {
                height: 180px;
                gap: 4px;
                padding: 10px;
            }
            .barra {
                max-width: 20px;
                min-height: 3px;
            }
            .btn {
                padding: 8px 18px;
                font-size: 12px;
            }
            .controles {
                gap: 10px;
            }
        }

        @media (max-width: 400px) {
            .letra {
                font-size: 18px;
                min-height: 60px;
            }
            .barras-container {
                height: 140px;
                gap: 3px;
            }
            .barra {
                max-width: 14px;
                min-height: 2px;
            }
            .info {
                font-size: 11px;
            }
            .titulo {
                font-size: 13px;
            }
        }

        ::-webkit-scrollbar {
            width: 0px;
        }
    </style>
</head>
<body>

    <div class="cargando" id="cargando">
        <div class="spinner"></div>
        <span>🎵 Cargando canción...</span>
    </div>

    <div class="container" id="container">

        <div class="letra-container">
            <div class="titulo" id="titulo">♫ Doma - Josean Log ♫</div>
            <div class="letra" id="letra">❤ De corazones tienes colección ❤</div>
        </div>

        <div class="barras-container" id="barrasContainer"></div>

        <div class="info">
            ⏱ <strong id="tiempoRestante">80.0</strong>s restantes
        </div>
        <div class="tiempo" id="modoTexto">🎵 Modo oscuro</div>

        <div class="controles">
            <button class="btn btn-primary" id="btnReiniciar">🔄 Reiniciar</button>
            <button class="btn btn-audio" id="btnAudio">🔊</button>
        </div>

    </div>

    <script>
        // ============================================================
        // CONFIGURACIÓN
        // ============================================================
        const DURACION_TOTAL = 80;
        const NUM_BARRAS = 40;
        const INICIO_AUDIO = 80; // ¡LA CANCIÓN EMPIEZA EN EL SEGUNDO 80!

        const LETRAS = [
            { tiempo: 0.0, texto: "❤ De corazones tienes colección ❤" },
            { tiempo: 3.5, texto: " ☼☽ Ya va amanecer ☀︎︎" },
            { tiempo: 7.5, texto: "✰ Y sigo en esta encrucijada ✰" },
            { tiempo: 10.5, texto: "✰ Misterio de mujer ✰" },
            { tiempo: 13.0, texto: "✰ Solo será cuestión de tiempo ✰" },
            { tiempo: 17.0, texto: ".ᐟ.ᐟ Debo interpretar tus gritos, tus llamadas .ᐟ.ᐟ" },
            { tiempo: 22.0, texto: "☔︎︎ Tus caricias entre cortadas ☔︎︎" },
            { tiempo: 26.0, texto: "❤ Y tus arranques de pasión ❤" },
            { tiempo: 31.0, texto: ".ᐟ.ᐟ Debo buscar dentro de tanto desperfecto .ᐟ.ᐟ" },
            { tiempo: 37.5, texto: "☔︎︎ La moraleja de este cuento ☔︎︎" },
            { tiempo: 40.0, texto: "➶➶ Debo domar tu corazón ➶➶" }
        ];

        // ============================================================
        // DOM
        // ============================================================
        const container = document.getElementById('container');
        const letraEl = document.getElementById('letra');
        const tituloEl = document.getElementById('titulo');
        const tiempoRestanteEl = document.getElementById('tiempoRestante');
        const modoTextoEl = document.getElementById('modoTexto');
        const barrasContainer = document.getElementById('barrasContainer');
        const btnReiniciar = document.getElementById('btnReiniciar');
        const btnAudio = document.getElementById('btnAudio');
        const cargando = document.getElementById('cargando');

        // ============================================================
        // AUDIO - INICIA EN EL SEGUNDO 80
        // ============================================================
        const audio = new Audio('music/doma.mp3');
        audio.loop = true;
        audio.volume = 0.7;
        let audioListo = false;

        audio.addEventListener('canplaythrough', () => {
            audioListo = true;
            cargando.classList.add('oculto');
            console.log('✅ Audio cargado correctamente');
            console.log(`🎵 Iniciando en el segundo ${INICIO_AUDIO}`);
        });

        audio.addEventListener('error', () => {
            console.warn('⚠️ No se pudo cargar el audio');
            cargando.classList.add('oculto');
        });

        audio.load();

        // ============================================================
        // CREAR BARRAS
        // ============================================================
        let barras = [];

        function crearBarras() {
            barrasContainer.innerHTML = '';
            barras = [];
            for (let i = 0; i < NUM_BARRAS; i++) {
                const barra = document.createElement('div');
                barra.className = 'barra';
                barra.style.height = '5px';
                barrasContainer.appendChild(barra);
                barras.push(barra);
            }
        }
        crearBarras();

        // ============================================================
        // FUNCIÓN CORAZÓN
        // ============================================================
        function generarCorazon(ancho, latido) {
            const alturas = new Array(ancho).fill(0.05);
            const centro = Math.floor(ancho / 2);

            const formaCorazon = [0.2, 0.3, 0.5, 0.7, 0.85, 0.95, 1.0, 0.95, 0.85, 0.7, 0.5, 0.3, 0.2];
            const inicio = centro - Math.floor(formaCorazon.length / 2);

            for (let i = 0; i < formaCorazon.length; i++) {
                const idx = inicio + i;
                if (idx >= 0 && idx < ancho) {
                    alturas[idx] = Math.max(alturas[idx], formaCorazon[i]);
                }
            }

            const intensidadLatido = 0.5 + 0.5 * Math.sin(latido * 10);

            for (let i = 0; i < ancho; i++) {
                if (alturas[i] < 0.3) {
                    const distancia = Math.abs(i - centro) / (ancho / 2);
                    const salto = (0.7 + 0.3 * Math.sin(latido * 12 - i * 0.5)) * (1 - distancia * 0.5);
                    alturas[i] = Math.max(alturas[i], salto);
                }
            }

            for (let i = 0; i < ancho; i++) {
                alturas[i] = alturas[i] * (0.3 + 0.7 * intensidadLatido);
            }

            for (let i = 0; i < ancho; i++) {
                alturas[i] += 0.2 * Math.abs(Math.sin(latido * 18)) * (Math.random() * 0.5 + 0.5);
            }

            return alturas.map(a => Math.min(Math.max(a, 0.05), 1));
        }

        // ============================================================
        // COLOR
        // ============================================================
        function getColor(altura, modoCorazon) {
            if (modoCorazon) {
                const r = Math.min(1, 0.4 + altura * 0.8);
                const g = Math.min(1, 0.1 + altura * 0.4);
                const b = Math.min(1, 0.1 + altura * 0.3);
                return `rgb(${Math.floor(r * 255)}, ${Math.floor(g * 255)}, ${Math.floor(b * 255)})`;
            } else {
                const hue = 200 + altura * 180;
                return `hsl(${hue}, 90%, ${30 + altura * 50}%)`;
            }
        }

        // ============================================================
        // ESTADO
        // ============================================================
        let tiempoInicio = 0;
        let reproduciendo = false;
        let animacionId = null;
        let pausado = false;

        // ============================================================
        // ACTUALIZAR ANIMACIÓN
        // ============================================================
        function actualizarAnimacion(timestamp) {
            if (!reproduciendo || pausado) {
                animacionId = requestAnimationFrame(actualizarAnimacion);
                return;
            }

            const tiempoActual = (Date.now() - tiempoInicio) / 1000;

            if (tiempoActual > DURACION_TOTAL) {
                tiempoInicio = Date.now();
                // Reiniciar audio también (pero como está en loop, no hace falta)
                return;
            }

            const tiempoRestante = Math.max(0, DURACION_TOTAL - tiempoActual);
            const modoCorazon = tiempoActual >= 40;

            // ===== FONDO =====
            let r, g, b;
            if (tiempoActual < 40) {
                r = 0.05 + 0.1 * Math.pow(Math.sin(tiempoActual * 0.5), 2);
                g = 0.05 + 0.1 * Math.pow(Math.sin(tiempoActual * 0.6), 2);
                b = 0.15 + 0.15 * Math.pow(Math.sin(tiempoActual * 0.7), 2);

                if (Math.sin(tiempoActual * 4) > 0.95) r = Math.min(0.3, r + 0.15);
                if (Math.sin(tiempoActual * 4.2) > 0.95) b = Math.min(0.4, b + 0.15);
            } else {
                r = 0.4 + 0.5 * Math.pow(Math.sin(tiempoActual * 1.5), 2);
                g = 0.1 + 0.3 * Math.pow(Math.sin(tiempoActual * 2.0), 2);
                b = 0.1 + 0.3 * Math.pow(Math.sin(tiempoActual * 2.5), 2);

                if (Math.sin(tiempoActual * 8) > 0.85) r = Math.min(1, r + 0.5);
                if (Math.sin(tiempoActual * 8.3) > 0.85) g = Math.min(0.8, g + 0.4);
                if (Math.sin(tiempoActual * 7.7) > 0.85) {
                    r = Math.min(1, r + 0.3);
                    g = Math.min(0.6, g + 0.2);
                }
            }

            const bgColor = `rgb(${Math.floor(r * 255)}, ${Math.floor(g * 255)}, ${Math.floor(b * 255)})`;
            container.style.background = bgColor;

            // ===== LETRA =====
            let textoActual = '';
            for (let i = LETRAS.length - 1; i >= 0; i--) {
                if (tiempoActual >= LETRAS[i].tiempo) {
                    textoActual = LETRAS[i].texto;
                    break;
                }
            }

            letraEl.textContent = textoActual;

            if (modoCorazon) {
                const hue = (tiempoActual * 20) % 360;
                letraEl.style.color = `hsl(${hue}, 100%, 65%)`;
                letraEl.style.textShadow = `0 0 40px hsla(${hue}, 100%, 65%, 0.3)`;
                tituloEl.style.color = '#ff6b6b';
                tituloEl.style.textShadow = '0 0 30px rgba(255, 107, 107, 0.3)';
            } else {
                const hue = 180 + (tiempoActual * 30) % 60;
                letraEl.style.color = `hsl(${hue}, 100%, 70%)`;
                letraEl.style.textShadow = `0 0 40px hsla(${hue}, 100%, 70%, 0.2)`;
                tituloEl.style.color = '#00ffff';
                tituloEl.style.textShadow = '0 0 30px rgba(0, 255, 255, 0.3)';
            }

            // ===== BARRAS =====
            let alturas;
            if (modoCorazon) {
                const latido = tiempoActual;
                alturas = generarCorazon(NUM_BARRAS, latido);
                for (let i = 0; i < NUM_BARRAS; i++) {
                    alturas[i] += 0.3 * Math.abs(Math.sin(tiempoActual * 10)) * (Math.random() * 0.5 + 0.5);
                    alturas[i] = Math.min(Math.max(alturas[i], 0.05), 1);
                }
            } else {
                alturas = [];
                for (let i = 0; i < NUM_BARRAS; i++) {
                    const freq = Math.abs(Math.sin(i * 0.3 + tiempoActual * 8));
                    const variacion = Math.random() * 0.3;
                    let altura = freq * (0.5 + 0.5 * Math.sin(tiempoActual * 3)) + variacion * 0.2;
                    altura = Math.min(Math.max(altura, 0.05), 1);
                    alturas.push(altura);
                }
            }

            for (let i = 0; i < NUM_BARRAS; i++) {
                const altura = alturas[i] || 0.05;
                const barra = barras[i];
                const alturaPx = Math.max(5, altura * 250);
                barra.style.height = alturaPx + 'px';
                barra.style.background = getColor(altura, modoCorazon);
            }

            // ===== TIEMPO =====
            tiempoRestanteEl.textContent = tiempoRestante.toFixed(1);
            modoTextoEl.textContent = modoCorazon ? '❤ MODO CORAZÓN ❤' : '🎵 Modo oscuro';
            modoTextoEl.style.color = modoCorazon ? '#ff6b6b' : '#888';

            if (modoCorazon) {
                tituloEl.textContent = `♫ TIEMPO RESTANTE: ${tiempoRestante.toFixed(1)}s ♫  ❤❤❤❤❤❤❤`;
            } else {
                tituloEl.textContent = `♫ TIEMPO RESTANTE: ${tiempoRestante.toFixed(1)}s ♫`;
            }

            animacionId = requestAnimationFrame(actualizarAnimacion);
        }

        // ============================================================
        // INICIAR
        // ============================================================
        function iniciar() {
            if (animacionId) {
                cancelAnimationFrame(animacionId);
            }
            tiempoInicio = Date.now();
            reproduciendo = true;
            pausado = false;
            animacionId = requestAnimationFrame(actualizarAnimacion);
        }

        // ============================================================
        // REINICIAR
        // ============================================================
        function reiniciar() {
            tiempoInicio = Date.now();
            pausado = false;
            
            // Reiniciar audio al segundo 80
            audio.currentTime = INICIO_AUDIO;
            if (audio.paused) {
                audio.play().catch(() => {});
            }
            
            container.style.background = '#0a0008';
            letraEl.style.color = '#fff';
            tituloEl.style.color = '#00ffff';
            tiempoRestanteEl.textContent = '80.0';
            modoTextoEl.textContent = '🎵 Modo oscuro';
            modoTextoEl.style.color = '#888';
        }

        // ============================================================
        // CONTROLES
        // ============================================================
        let audioEncendido = true;

        btnAudio.addEventListener('click', () => {
            if (audioEncendido) {
                audio.pause();
                audioEncendido = false;
                btnAudio.textContent = '🔇';
                pausado = true;
            } else {
                audio.currentTime = INICIO_AUDIO;
                audio.play().catch(() => {});
                audioEncendido = true;
                btnAudio.textContent = '🔊';
                pausado = false;
                if (!tiempoInicio) {
                    tiempoInicio = Date.now();
                }
            }
        });

        btnReiniciar.addEventListener('click', reiniciar);

        // ============================================================
        // INICIO
        // ============================================================
        console.log('♫ Doma - Josean Log | Visualizador Musical ♫');
        console.log(`🎵 Audio: music/doma.mp3 (inicia en segundo ${INICIO_AUDIO})`);
        console.log('🎵 Modo oscuro hasta los 40 segundos');
        console.log('❤ A los 40 segundos: MODO CORAZÓN');
        console.log('🔄 Bucle infinito automático');

        iniciar();

        // Reproducir audio desde el segundo 80
        const intentarAudio = () => {
            if (audioListo) {
                audio.currentTime = INICIO_AUDIO;
                audio.play().catch(() => {
                    console.log('⏳ Esperando interacción del usuario');
                });
            }
            document.removeEventListener('click', intentarAudio);
            document.removeEventListener('touchstart', intentarAudio);
        };

        document.addEventListener('click', intentarAudio);
        document.addEventListener('touchstart', intentarAudio);

        setTimeout(() => {
            if (audioListo) {
                audio.currentTime = INICIO_AUDIO;
                audio.play().catch(() => {});
            }
        }, 500);

        window.addEventListener('resize', () => {});
    </script>

</body>
</html>
