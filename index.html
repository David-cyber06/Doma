<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>♫ Doma - Josean Log | Visualizador Musical ♫</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0008;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
            user-select: none;
            height: 100vh;
            width: 100vw;
        }

        .container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: #0a0008;
            transition: background 0.1s ease;
            padding: 8px 16px 10px;
            overflow: hidden;
            padding-top: 6px;
        }

        .particulas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .particula {
            position: absolute;
            border-radius: 50%;
            pointer-events: none;
            animation: particulaVolar 2.5s ease-out forwards;
            opacity: 0;
        }

        @keyframes particulaVolar {
            0% {
                opacity: 1;
                transform: translate(0, 0) scale(1);
            }
            100% {
                opacity: 0;
                transform: translate(var(--dx), var(--dy)) scale(0);
            }
        }

        /* ===== LETRA ===== */
        .letra-container {
            width: 92%;
            max-width: 850px;
            text-align: center;
            min-height: 55px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 2px 16px 2px;
            position: relative;
            z-index: 1;
            flex-shrink: 0;
        }

        .titulo {
            color: #00ffff;
            font-size: 14px;
            font-weight: bold;
            letter-spacing: 2px;
            margin-bottom: 1px;
            text-shadow: 0 0 20px rgba(0, 255, 255, 0.3);
            transition: all 0.3s ease;
            min-height: 22px;
            z-index: 1;
        }

        .letra {
            font-size: 20px;
            font-weight: bold;
            text-align: center;
            min-height: 38px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.1s ease;
            padding: 2px;
            line-height: 1.2;
            text-shadow: 0 0 30px rgba(255, 255, 255, 0.1);
            color: #fff;
            z-index: 1;
            position: relative;
            width: 100%;
        }

        .letra .brillo {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 120%;
            height: 120%;
            background: radial-gradient(circle, rgba(255, 100, 150, 0.3), transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            animation: brilloLetra 0.5s ease-in-out infinite alternate;
            display: none;
        }

        @keyframes brilloLetra {
            0% {
                transform: translate(-50%, -50%) scale(0.8);
                opacity: 0.3;
            }
            100% {
                transform: translate(-50%, -50%) scale(1.5);
                opacity: 0.8;
            }
        }

        /* ===== GRÁFICO ===== */
        .grafico-container {
            width: 94%;
            max-width: 940px;
            position: relative;
            z-index: 1;
            flex-shrink: 0;
            height: 400px;
            display: flex;
            flex-direction: column;
            flex: 1;
            min-height: 280px;
            max-height: 520px;
        }

        .grafico-container .ejes {
            position: relative;
            width: 100%;
            height: 100%;
            min-height: 240px;
            max-height: 460px;
            flex: 1;
            margin-left: 48px;
        }

        .eje-y {
            position: absolute;
            left: -46px;
            top: 0;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            color: #666;
            font-size: 9px;
            font-family: 'Segoe UI', monospace;
            letter-spacing: 0.5px;
            text-align: right;
            padding-right: 5px;
            width: 36px;
        }
        .eje-y span {
            opacity: 0.5;
        }

        .eje-y-titulo {
            position: absolute;
            left: -50px;
            top: 50%;
            transform: translateY(-50%) rotate(-90deg);
            color: #555;
            font-size: 10px;
            letter-spacing: 2px;
            font-family: 'Segoe UI', sans-serif;
            white-space: nowrap;
            opacity: 0.6;
            font-weight: 300;
        }

        .barras-wrapper {
            position: absolute;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            gap: 3px;
            padding: 0 3px;
            border-left: 1px solid rgba(255, 255, 255, 0.08);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }

        .barra {
            flex: 1;
            height: 3px;
            min-height: 2px;
            border-radius: 3px 3px 0 0;
            transition: height 0.04s ease, background 0.04s ease;
            background: cyan;
            max-width: 28px;
            will-change: height;
        }

        .eje-x {
            display: flex;
            justify-content: space-between;
            padding: 3px 6px 0 6px;
            margin-left: 48px;
            color: #555;
            font-size: 8px;
            font-family: 'Segoe UI', monospace;
            letter-spacing: 0.5px;
        }
        .eje-x span {
            opacity: 0.5;
        }

        .eje-x-titulo {
            text-align: center;
            color: #555;
            font-size: 10px;
            letter-spacing: 2px;
            font-family: 'Segoe UI', sans-serif;
            opacity: 0.6;
            font-weight: 300;
            margin-top: 0px;
            margin-left: 48px;
        }

        /* ===== INFO Y CONTROLES ===== */
        .info {
            color: #888;
            font-size: 13px;
            margin-top: 10px;
            letter-spacing: 2px;
            text-align: center;
            z-index: 1;
            position: relative;
            flex-shrink: 0;
        }
        .info strong {
            color: #ff6b6b;
        }

        .tiempo {
            color: #aaa;
            font-size: 13px;
            margin-top: 1px;
            letter-spacing: 1px;
            z-index: 1;
            position: relative;
            flex-shrink: 0;
        }

        .controles {
            margin-top: 10px;
            margin-bottom: 10px;
            display: flex;
            gap: 14px;
            align-items: center;
            flex-wrap: wrap;
            justify-content: center;
            z-index: 1;
            position: relative;
            flex-shrink: 0;
        }

        .btn {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.12);
            color: #ddd;
            padding: 10px 28px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s ease;
            font-family: inherit;
            letter-spacing: 1px;
            z-index: 1;
            touch-action: manipulation;
            min-height: 44px;
            min-width: 44px;
        }

        .btn:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.25);
            transform: scale(1.02);
        }

        .btn:active {
            transform: scale(0.95);
        }

        .btn-primary {
            background: rgba(255, 107, 107, 0.2);
            border-color: rgba(255, 107, 107, 0.35);
            color: #ff6b6b;
        }

        .btn-primary:hover {
            background: rgba(255, 107, 107, 0.3);
            border-color: rgba(255, 107, 107, 0.55);
        }

        .btn-audio {
            background: rgba(0, 255, 255, 0.15);
            border-color: rgba(0, 255, 255, 0.25);
            color: #00ffff;
            min-width: 54px;
        }

        .btn-audio:hover {
            background: rgba(0, 255, 255, 0.25);
            border-color: rgba(0, 255, 255, 0.45);
        }

        .mensaje-audio {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            color: #d4a0d4;
            font-size: 16px;
            background: rgba(10, 0, 15, 0.85);
            padding: 12px 24px;
            border-radius: 30px;
            border: 1px solid rgba(180, 80, 180, 0.2);
            backdrop-filter: blur(10px);
            z-index: 100;
            animation: pulseMensaje 2s ease-in-out infinite;
            display: none;
            text-align: center;
            letter-spacing: 1px;
            pointer-events: none;
        }

        .mensaje-audio.mostrar {
            display: block;
        }

        @keyframes pulseMensaje {
            0%,
            100% {
                opacity: 0.7;
                transform: translateX(-50%) scale(1);
            }
            50% {
                opacity: 1;
                transform: translateX(-50%) scale(1.05);
            }
        }

        .cargando {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #0a0008;
            z-index: 1000;
            color: #d4a0d4;
            font-size: 20px;
            letter-spacing: 3px;
            flex-direction: column;
            gap: 20px;
        }
        .cargando .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(180, 80, 180, 0.1);
            border-top: 3px solid #d4a0d4;
            border-radius: 50%;
            animation: girar 1s linear infinite;
        }
        @keyframes girar {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }
        .cargando.oculto {
            display: none;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 768px) {
            .container {
                padding: 4px 10px 6px;
                padding-top: 4px;
            }
            .letra {
                font-size: 16px;
                min-height: 32px;
            }
            .titulo {
                font-size: 12px;
                min-height: 20px;
            }
            .letra-container {
                min-height: 44px;
                padding: 1px 10px 2px;
            }
            .grafico-container {
                height: 300px;
                min-height: 200px;
                max-height: 400px;
            }
            .grafico-container .ejes {
                min-height: 160px;
                max-height: 330px;
                margin-left: 38px;
            }
            .eje-y {
                left: -38px;
                width: 30px;
                font-size: 8px;
            }
            .eje-y-titulo {
                left: -42px;
                font-size: 9px;
            }
            .eje-x {
                margin-left: 38px;
                font-size: 8px;
                padding: 2px 4px 0 4px;
            }
            .eje-x-titulo {
                margin-left: 38px;
                font-size: 9px;
            }
            .barras-wrapper {
                gap: 3px;
                padding: 0 3px;
            }
            .barra {
                max-width: 18px;
                min-height: 2px;
            }
            .btn {
                padding: 8px 20px;
                font-size: 12px;
                min-height: 40px;
                min-width: 40px;
            }
            .controles {
                gap: 10px;
                margin-top: 8px;
                margin-bottom: 6px;
            }
            .info {
                font-size: 12px;
                margin-top: 8px;
            }
            .tiempo {
                font-size: 12px;
                margin-top: 1px;
            }
            .mensaje-audio {
                font-size: 14px;
                padding: 10px 20px;
                bottom: 70px;
            }
        }

        @media (max-width: 480px) {
            .container {
                padding: 2px 6px 4px;
                padding-top: 2px;
            }
            .letra {
                font-size: 13px;
                min-height: 26px;
            }
            .titulo {
                font-size: 10px;
                min-height: 16px;
            }
            .letra-container {
                min-height: 36px;
                padding: 1px 6px 1px;
            }
            .grafico-container {
                height: 200px;
                min-height: 150px;
                max-height: 300px;
            }
            .grafico-container .ejes {
                min-height: 120px;
                max-height: 240px;
                margin-left: 32px;
            }
            .eje-y {
                left: -32px;
                width: 26px;
                font-size: 7px;
            }
            .eje-y-titulo {
                left: -36px;
                font-size: 8px;
            }
            .eje-x {
                margin-left: 32px;
                font-size: 7px;
            }
            .eje-x-titulo {
                margin-left: 32px;
                font-size: 8px;
            }
            .barras-wrapper {
                gap: 2px;
                padding: 0 2px;
            }
            .barra {
                max-width: 12px;
                min-height: 2px;
            }
            .btn {
                padding: 6px 14px;
                font-size: 11px;
                min-height: 36px;
                min-width: 36px;
            }
            .controles {
                gap: 8px;
                margin-top: 6px;
                margin-bottom: 4px;
            }
            .info {
                font-size: 11px;
                margin-top: 6px;
            }
            .mensaje-audio {
                font-size: 12px;
                padding: 8px 16px;
                bottom: 60px;
            }
        }

        ::-webkit-scrollbar {
            width: 0px;
        }
    </style>
</head>
<body>

    <div class="cargando" id="cargando">
        <div class="spinner"></div>
        <span>🎵 Cargando canción...</span>
    </div>

    <div class="particulas-container" id="particulasContainer"></div>

    <div class="mensaje-audio" id="mensajeAudio">🎵 Toca en cualquier lugar para activar el audio</div>

    <div class="container" id="container">

        <div class="letra-container">
            <div class="titulo" id="titulo">♫ Doma - Josean Log ♫</div>
            <div class="letra" id="letra">
                ❤ De corazones tienes colección ❤
                <div class="brillo" id="brilloLetra"></div>
            </div>
        </div>

        <div class="grafico-container">
            <div class="ejes" id="ejesGrafico">
                <div class="eje-y">
                    <span>1.0</span>
                    <span>0.75</span>
                    <span>0.5</span>
                    <span>0.25</span>
                    <span>0.0</span>
                </div>
                <div class="eje-y-titulo">Intensidad</div>
                <div class="barras-wrapper" id="barrasContainer"></div>
            </div>
            <div class="eje-x">
                <span>0</span>
                <span>10</span>
                <span>20</span>
                <span>30</span>
                <span>40</span>
                <span>50</span>
                <span>60</span>
                <span>70</span>
                <span>80</span>
                <span>90</span>
                <span>100</span>
            </div>
            <div class="eje-x-titulo">Frecuencia</div>
        </div>

        <div class="info">
            ⏱ <strong id="tiempoRestante">99.0</strong>s restantes
        </div>
        <div class="tiempo" id="modoTexto">🎵</div>

        <div class="controles">
            <button class="btn btn-primary" id="btnReiniciar">🔄 Reiniciar</button>
            <button class="btn btn-audio" id="btnAudio">🔊</button>
        </div>

    </div>

    <script>
        // ============================================================
        // CONFIGURACIÓN
        // ============================================================
        const DURACION_TOTAL = 99;
        const NUM_BARRAS = 40;
        const INICIO_AUDIO = 80;
        const MODO_EXPLOSIVO = 40;
        const ALTURA_MAXIMA_EXPLOSIVO = 130;
        const ALTURA_MAXIMA_NORMAL = 180;

        const LETRAS = [
            { tiempo: 0.0, texto: "❤ De corazones tienes colección ❤" },
            { tiempo: 3.5, texto: " ☼☽ Ya va amanecer ☀︎︎" },
            { tiempo: 7.5, texto: "✰ Y sigo en esta encrucijada ✰" },
            { tiempo: 10.5, texto: "✰ Misterio de mujer ✰" },
            { tiempo: 13.0, texto: "✰ Solo será cuestión de tiempo ✰" },
            { tiempo: 17.0, texto: ".ᐟ.ᐟ Debo interpretar tus gritos, tus llamadas .ᐟ.ᐟ" },
            { tiempo: 22.0, texto: "☔︎︎ Tus caricias entre cortadas ☔︎︎" },
            { tiempo: 26.0, texto: "❤ Y tus arranques de pasión ❤" },
            { tiempo: 31.0, texto: ".ᐟ.ᐟ Debo buscar dentro de tanto desperfecto .ᐟ.ᐟ" },
            { tiempo: 37.5, texto: "☔︎︎ La moraleja de este cuento ☔︎︎" },
            { tiempo: 40.0, texto: "➶➶ DEBO DOMAR TU CORAZÓN ➶➶" },
            { tiempo: 74.0, texto: "⚔️ Y debo enterrar el filo de tu espada ⚔️" },
            { tiempo: 78.0, texto: "🛏️ En los secretos de tu almohada 🛏️" },
            { tiempo: 83.0, texto: "📖 Hasta que entiendas la lección 📖" },
            { tiempo: 87.0, texto: "🌀 Debo llegar al fondo de este desparpajo 🌀" },
            { tiempo: 93.0, texto: "💪 Que yo de esta no me rajo 💪" },
            { tiempo: 95.0, texto: "❤️‍🔥 Hasta domar tu corazón ❤️‍🔥" }
        ];

        // ============================================================
        // DOM
        // ============================================================
        const container = document.getElementById('container');
        const letraEl = document.getElementById('letra');
        const brilloLetra = document.getElementById('brilloLetra');
        const tituloEl = document.getElementById('titulo');
        const tiempoRestanteEl = document.getElementById('tiempoRestante');
        const modoTextoEl = document.getElementById('modoTexto');
        const barrasContainer = document.getElementById('barrasContainer');
        const particulasContainer = document.getElementById('particulasContainer');
        const btnReiniciar = document.getElementById('btnReiniciar');
        const btnAudio = document.getElementById('btnAudio');
        const cargando = document.getElementById('cargando');
        const ejesGrafico = document.getElementById('ejesGrafico');
        const mensajeAudio = document.getElementById('mensajeAudio');

        // ============================================================
        // AUDIO
        // ============================================================
        const audio = new Audio('music/doma.mp3');
        audio.loop = true;
        audio.volume = 0.7;
        let audioListo = false;
        let audioIniciado = false;

        audio.addEventListener('canplaythrough', () => {
            audioListo = true;
            cargando.classList.add('oculto');
            console.log('✅ Audio cargado');
            if (window.innerWidth <= 768) {
                mensajeAudio.classList.add('mostrar');
            }
        });

        audio.addEventListener('error', () => {
            console.warn('⚠️ No se cargó el audio');
            cargando.classList.add('oculto');
        });

        audio.load();

        // ============================================================
        // INICIAR AUDIO
        // ============================================================
        function iniciarAudio() {
            if (audioListo && !audioIniciado) {
                audio.currentTime = INICIO_AUDIO;
                audio.play().then(() => {
                    audioIniciado = true;
                    mensajeAudio.classList.remove('mostrar');
                    console.log('🔊 Audio iniciado');
                }).catch(() => {
                    console.log('⏳ Audio bloqueado, esperando interacción');
                });
            }
        }

        document.addEventListener('click', iniciarAudio);
        document.addEventListener('touchstart', iniciarAudio);

        // ============================================================
        // BOTÓN AUDIO
        // ============================================================
        let audioEncendido = true;

        btnAudio.addEventListener('click', () => {
            if (!audioIniciado) {
                iniciarAudio();
            }
            if (audioIniciado) {
                if (audioEncendido) {
                    audio.pause();
                    audioEncendido = false;
                    btnAudio.textContent = '🔇';
                    pausado = true;
                } else {
                    audio.currentTime = INICIO_AUDIO;
                    audio.play().catch(() => {});
                    audioEncendido = true;
                    btnAudio.textContent = '🔊';
                    pausado = false;
                    if (!tiempoInicio) {
                        tiempoInicio = Date.now();
                    }
                }
            }
        });

        // ============================================================
        // CREAR BARRAS
        // ============================================================
        let barras = [];

        function crearBarras() {
            barrasContainer.innerHTML = '';
            barras = [];
            for (let i = 0; i < NUM_BARRAS; i++) {
                const barra = document.createElement('div');
                barra.className = 'barra';
                barra.style.height = '3px';
                barrasContainer.appendChild(barra);
                barras.push(barra);
            }
        }
        crearBarras();

        // ============================================================
        // GENERAR CORAZÓN (OPTIMIZADO)
        // ============================================================
        function generarCorazon(ancho, latido, explosivo) {
            const alturas = new Array(ancho);
            const centro = Math.floor(ancho / 2);
            const formaCorazon = [0.2, 0.3, 0.5, 0.7, 0.85, 0.95, 1.0, 0.95, 0.85, 0.7, 0.5, 0.3, 0.2];
            const inicio = centro - 6;

            for (let i = 0; i < ancho; i++) {
                alturas[i] = 0.05;
            }

            for (let i = 0; i < formaCorazon.length; i++) {
                const idx = inicio + i;
                if (idx >= 0 && idx < ancho) {
                    alturas[idx] = formaCorazon[i];
                }
            }

            if (explosivo) {
                const latidoAbs = Math.abs(Math.sin(latido * 14));
                const intensidad = 0.3 + 0.7 * Math.min(latidoAbs * 1.5, 1);

                for (let i = 0; i < ancho; i++) {
                    const dist = Math.abs(i - centro) / (ancho / 2);
                    const salto = (0.5 + 0.5 * Math.sin(latido * 14 - i * 0.4 + 0.5)) * (1 - dist * 0.4);
                    alturas[i] = Math.max(alturas[i], salto * 0.6);
                    alturas[i] = alturas[i] * (0.2 + 0.8 * intensidad);
                    alturas[i] += 0.15 * Math.abs(Math.sin(latido * 18 + i * 2)) * (0.4 + 0.6 * Math.random());
                    alturas[i] = Math.min(Math.max(alturas[i], 0.05), 1);
                }
            } else {
                const intensidad = 0.5 + 0.5 * Math.sin(latido * 10);
                for (let i = 0; i < ancho; i++) {
                    const dist = Math.abs(i - centro) / (ancho / 2);
                    const salto = (0.5 + 0.5 * Math.sin(latido * 10 - i * 0.3)) * (1 - dist * 0.5);
                    alturas[i] = Math.max(alturas[i], salto * 0.5);
                    alturas[i] = alturas[i] * (0.2 + 0.8 * intensidad);
                    alturas[i] += 0.1 * Math.abs(Math.sin(latido * 12 + i * 1.5)) * Math.random();
                    alturas[i] = Math.min(Math.max(alturas[i], 0.05), 1);
                }
            }

            return alturas;
        }

        // ============================================================
        // COLOR (OPTIMIZADO - precalculado)
        // ============================================================
        const colorCache = {};

        function getColor(altura, explosivo) {
            const key = Math.round(altura * 100) + '_' + (explosivo ? '1' : '0');
            if (colorCache[key]) return colorCache[key];

            let color;
            if (explosivo) {
                const r = Math.min(1, 0.5 + altura * 0.7);
                const g = Math.min(1, 0.1 + altura * 0.4);
                const b = Math.min(1, 0.1 + altura * 0.25);
                color = `rgb(${Math.floor(r * 255)},${Math.floor(g * 255)},${Math.floor(b * 255)})`;
            } else {
                const hue = 200 + altura * 180;
                color = `hsl(${hue},90%,${30 + altura * 50}%)`;
            }
            colorCache[key] = color;
            return color;
        }

        // ============================================================
        // PARTÍCULAS (OPTIMIZADO - menos cantidad)
        // ============================================================
        let particulaTimer = 0;

        function crearParticula(x, y, color) {
            const particula = document.createElement('div');
            particula.className = 'particula';
            const size = 3 + Math.random() * 7;
            const angulo = Math.random() * 2 * Math.PI;
            const distancia = 80 + Math.random() * 200;
            const dx = Math.cos(angulo) * distancia;
            const dy = Math.sin(angulo) * distancia - 80;

            particula.style.width = size + 'px';
            particula.style.height = size + 'px';
            particula.style.left = (x - size / 2) + 'px';
            particula.style.top = (y - size / 2) + 'px';
            particula.style.setProperty('--dx', dx + 'px');
            particula.style.setProperty('--dy', dy + 'px');
            particula.style.background = color;
            particula.style.boxShadow = `0 0 ${size * 2}px ${color}`;
            particula.style.animationDuration = (1.5 + Math.random() * 1.5) + 's';

            particulasContainer.appendChild(particula);

            setTimeout(() => {
                if (particula.parentNode) particula.remove();
            }, 3500);
        }

        function explosionParticulas(centroX, centroY, cantidad) {
            const colores = ['#ff6b6b', '#ff4757', '#ff6348', '#ff9ff3', '#f368e0', '#ff6b81', '#ffda79', '#ffb142', '#ff00ff',
                '#ff1493', '#ff69b4'
            ];

            for (let i = 0; i < cantidad; i++) {
                const color = colores[Math.floor(Math.random() * colores.length)];
                const x = centroX + (Math.random() - 0.5) * 80;
                const y = centroY + (Math.random() - 0.5) * 80;
                crearParticula(x, y, color);
            }
        }

        // ============================================================
        // ESTADO
        // ============================================================
        let tiempoInicio = 0;
        let reproduciendo = false;
        let animacionId = null;
        let pausado = false;
        let frameCounter = 0;
        let reiniciando = false;

        // ============================================================
        // ACTUALIZAR ANIMACIÓN (OPTIMIZADA)
        // ============================================================
        function actualizarAnimacion(timestamp) {
            if (!reproduciendo || pausado) {
                animacionId = requestAnimationFrame(actualizarAnimacion);
                return;
            }

            frameCounter++;
            const tiempoActual = (Date.now() - tiempoInicio) / 1000;

            if (tiempoActual > DURACION_TOTAL) {
                tiempoInicio = Date.now();
                if (audio.paused && audioEncendido && audioIniciado) {
                    audio.currentTime = INICIO_AUDIO;
                    audio.play().catch(() => {});
                }
                return;
            }

            const tiempoRestante = Math.max(0, DURACION_TOTAL - tiempoActual);
            const explosivo = tiempoActual >= MODO_EXPLOSIVO;

            // ===== FONDO (optimizado - cambios menos frecuentes) =====
            if (frameCounter % 2 === 0 || explosivo) {
                let r, g, b;
                if (!explosivo) {
                    r = 0.05 + 0.1 * Math.pow(Math.sin(tiempoActual * 0.5), 2);
                    g = 0.05 + 0.1 * Math.pow(Math.sin(tiempoActual * 0.6), 2);
                    b = 0.15 + 0.15 * Math.pow(Math.sin(tiempoActual * 0.7), 2);
                    if (Math.sin(tiempoActual * 4) > 0.95) r = Math.min(0.3, r + 0.15);
                    if (Math.sin(tiempoActual * 4.2) > 0.95) b = Math.min(0.4, b + 0.15);
                } else {
                    const pulso = Math.sin(tiempoActual * 3) * 0.5 + 0.5;
                    r = 0.3 + 0.7 * pulso;
                    g = 0.05 + 0.4 * Math.pow(Math.sin(tiempoActual * 2.5 + 1), 2);
                    b = 0.05 + 0.4 * Math.pow(Math.sin(tiempoActual * 2.8 + 2), 2);

                    if (Math.sin(tiempoActual * 12) > 0.9) r = Math.min(1, r + 0.5);
                    if (Math.sin(tiempoActual * 13) > 0.9) g = Math.min(0.8, g + 0.5);
                    if (Math.sin(tiempoActual * 11) > 0.9) { r = Math.min(1, r + 0.4);
                        b = Math.min(1, b + 0.4); }
                    if (Math.sin(tiempoActual * 20) > 0.95) { r = 1;
                        g = 1;
                        b = 1; }
                }
                const bgColor = `rgb(${Math.floor(r * 255)},${Math.floor(g * 255)},${Math.floor(b * 255)})`;
                container.style.background = bgColor;
            }

            // ===== LETRA =====
            if (frameCounter % 2 === 0 || explosivo) {
                let textoActual = '';
                for (let i = LETRAS.length - 1; i >= 0; i--) {
                    if (tiempoActual >= LETRAS[i].tiempo) {
                        textoActual = LETRAS[i].texto;
                        break;
                    }
                }

                if (letraEl.textContent !== textoActual) {
                    letraEl.textContent = textoActual;
                }

                if (explosivo) {
                    const hue = (tiempoActual * 60) % 360;
                    const lig = 55 + 20 * Math.sin(tiempoActual * 5);
                    letraEl.style.color = `hsl(${hue},100%,${lig}%)`;
                    letraEl.style.textShadow =
                        `0 0 30px hsla(${hue},100%,70%,0.5),0 0 60px hsla(${hue+30},100%,60%,0.3),0 0 100px hsla(${hue+60},100%,50%,0.2)`;
                    letraEl.style.transform = `scale(${1 + 0.03 * Math.sin(tiempoActual * 8)})`;
                    brilloLetra.style.display = 'block';
                    brilloLetra.style.background =
                        `radial-gradient(circle, hsla(${hue},100%,70%,0.4), transparent 70%)`;
                    tituloEl.style.color = '#ff6b6b';
                    tituloEl.style.textShadow = '0 0 30px rgba(255,107,107,0.5),0 0 60px rgba(255,107,107,0.2)';
                } else {
                    const hue = 180 + (tiempoActual * 30) % 60;
                    letraEl.style.color = `hsl(${hue},100%,70%)`;
                    letraEl.style.textShadow = `0 0 40px hsla(${hue},100%,70%,0.2)`;
                    letraEl.style.transform = 'scale(1)';
                    brilloLetra.style.display = 'none';
                    tituloEl.style.color = '#00ffff';
                    tituloEl.style.textShadow = '0 0 30px rgba(0,255,255,0.3)';
                }
            }

            // ===== BARRAS =====
            const latido = tiempoActual * (explosivo ? 1.3 : 1);
            const alturas = generarCorazon(NUM_BARRAS, latido, explosivo);
            const alturaMax = explosivo ? ALTURA_MAXIMA_EXPLOSIVO : ALTURA_MAXIMA_NORMAL;
            const ejesHeight = ejesGrafico.clientHeight || 300;
            const escala = (alturaMax / 200) * ejesHeight * 0.85;

            for (let i = 0; i < NUM_BARRAS; i++) {
                const altura = alturas[i] || 0.05;
                const barra = barras[i];
                const alturaPx = Math.max(2, altura * escala);
                barra.style.height = alturaPx + 'px';
                barra.style.background = getColor(altura, explosivo);
                if (explosivo) {
                    const brillo = 6 + altura * 16;
                    barra.style.boxShadow = `0 0 ${brillo}px ${getColor(altura, true)}`;
                } else {
                    barra.style.boxShadow = 'none';
                }
            }

            // ===== PARTÍCULAS (MODO EXPLOSIVO - REDUCIDAS) =====
            if (explosivo) {
                particulaTimer++;
                if (particulaTimer % 3 === 0) {
                    const ancho = window.innerWidth;
                    const alto = window.innerHeight;
                    const cx = ancho / 2;
                    const cy = alto / 2;
                    const cantidad = 2 + Math.floor(Math.random() * 4);
                    const centroX = cx + (Math.random() - 0.5) * 250;
                    const centroY = cy * 0.35 + (Math.random() - 0.5) * 100;
                    explosionParticulas(centroX, centroY, cantidad);
                }

                if (particulaTimer % 25 === 0) {
                    const cx = window.innerWidth / 2;
                    const cy = window.innerHeight / 2;
                    explosionParticulas(cx, cy * 0.35, 8 + Math.floor(Math.random() * 8));
                }
                if (particulaTimer % 15 === 0) {
                    const x = Math.random() * window.innerWidth;
                    const y = Math.random() * window.innerHeight * 0.5;
                    explosionParticulas(x, y, 1 + Math.floor(Math.random() * 2));
                }
            }

            // ===== TIEMPO =====
            tiempoRestanteEl.textContent = tiempoRestante.toFixed(1);

            if (explosivo) {
                modoTextoEl.textContent = '❤🔥';
                modoTextoEl.style.color = '#ff6b6b';
                modoTextoEl.style.textShadow = '0 0 30px rgba(255,107,107,0.5)';
                modoTextoEl.style.fontSize = '20px';
                tituloEl.textContent = `♫ TIEMPO RESTANTE: ${tiempoRestante.toFixed(1)}s ♫  ❤🔥❤🔥❤🔥❤🔥❤🔥`;
            } else {
                modoTextoEl.textContent = '🎵';
                modoTextoEl.style.color = '#888';
                modoTextoEl.style.textShadow = 'none';
                modoTextoEl.style.fontSize = '16px';
                tituloEl.textContent = `♫ TIEMPO RESTANTE: ${tiempoRestante.toFixed(1)}s ♫`;
            }

            animacionId = requestAnimationFrame(actualizarAnimacion);
        }

        // ============================================================
        // INICIAR
        // ============================================================
        function iniciar() {
            if (animacionId) {
                cancelAnimationFrame(animacionId);
            }
            tiempoInicio = Date.now();
            reproduciendo = true;
            pausado = false;
            frameCounter = 0;
            particulaTimer = 0;
            reiniciando = false;
            animacionId = requestAnimationFrame(actualizarAnimacion);
        }

        // ============================================================
        // REINICIAR
        // ============================================================
        function reiniciar() {
            if (reiniciando) return;
            reiniciando = true;

            if (animacionId) {
                cancelAnimationFrame(animacionId);
                animacionId = null;
            }

            tiempoInicio = Date.now();
            pausado = false;
            frameCounter = 0;
            particulaTimer = 0;

            if (audioIniciado) {
                audio.currentTime = INICIO_AUDIO;
                if (audioEncendido) {
                    audio.play().catch(() => {});
                }
            }

            container.style.background = '#0a0008';
            letraEl.style.color = '#fff';
            letraEl.style.transform = 'scale(1)';
            tituloEl.style.color = '#00ffff';
            tituloEl.style.textShadow = '0 0 30px rgba(0,255,255,0.3)';
            tiempoRestanteEl.textContent = '99.0';
            modoTextoEl.textContent = '🎵';
            modoTextoEl.style.color = '#888';
            modoTextoEl.style.textShadow = 'none';
            modoTextoEl.style.fontSize = '16px';
            brilloLetra.style.display = 'none';

            particulasContainer.innerHTML = '';

            for (let i = 0; i < NUM_BARRAS; i++) {
                const barra = barras[i];
                barra.style.height = '3px';
                barra.style.background = 'cyan';
                barra.style.boxShadow = 'none';
            }

            reproduciendo = true;
            animacionId = requestAnimationFrame(actualizarAnimacion);

            setTimeout(() => {
                reiniciando = false;
            }, 100);

            console.log('🔄 Reiniciado correctamente');
        }

        // ============================================================
        // BOTÓN REINICIAR
        // ============================================================
        btnReiniciar.addEventListener('click', reiniciar);

        // ============================================================
        // INICIO
        // ============================================================
        console.log('♫ Doma - Josean Log | Visualizador Musical ♫');
        console.log(`🎵 Audio inicia en segundo ${INICIO_AUDIO}`);
        console.log('❤🔥 A los 40 segundos: MODO EXPLOSIVO');
        console.log('🔄 Bucle infinito automático');

        iniciar();

        setTimeout(() => {
            if (audioListo && !audioIniciado) {
                iniciarAudio();
            }
        }, 1000);

        window.addEventListener('resize', () => {});
    </script>
