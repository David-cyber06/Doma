<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>♫ Doma - Josean Log | Visualizador Musical ♫</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0008;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden; 
            user-select: none;
            height: 100vh;
            width: 100vw;
        }

        /* ===== FOTO DE FONDO ===== */
        .fondo-foto {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            background-image: url('image/wiwi.jpeg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            filter: brightness(0.4) saturate(0.8);
            transition: filter 0.1s ease;
        }

        .fondo-foto.explosivo {
            filter: brightness(0.5) saturate(1.1) contrast(1.05);
        }

        .container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: transparent;
            padding: 8px 16px 10px;
            overflow: hidden;
            padding-top: 6px;
            z-index: 1;
        }

        .particulas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
            overflow: hidden;
        }

        .particula {
            position: absolute;
            border-radius: 50%;
            pointer-events: none;
            animation: particulaVolar 2.5s ease-out forwards;
            opacity: 0;
        }

        @keyframes particulaVolar {
            0% {
                opacity: 1;
                transform: translate(0, 0) scale(1);
            }
            100% {
                opacity: 0;
                transform: translate(var(--dx), var(--dy)) scale(0);
            }
        }

        .letra-container {
            width: 92%;
            max-width: 850px;
            text-align: center;
            min-height: 55px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 2px 16px 2px;
            position: relative;
            z-index: 2;
            flex-shrink: 0;
        }

        .titulo {
            color: #00ffff;
            font-size: 14px;
            font-weight: bold;
            letter-spacing: 2px;
            margin-bottom: 1px;
            text-shadow: 0 0 20px rgba(0, 255, 255, 0.3), 0 0 40px rgba(0, 0, 0, 0.8);
            transition: all 0.3s ease;
            min-height: 22px;
            z-index: 2;
        }

        .letra {
            font-size: 20px;
            font-weight: bold;
            text-align: center;
            min-height: 38px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.1s ease;
            padding: 2px;
            line-height: 1.2;
            text-shadow: 0 0 30px rgba(255, 255, 255, 0.1), 0 0 60px rgba(0, 0, 0, 0.9);
            color: #fff;
            z-index: 2;
            position: relative;
            width: 100%;
        }

        .letra .brillo {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 120%;
            height: 120%;
            background: radial-gradient(circle, rgba(255, 100, 150, 0.3), transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            animation: brilloLetra 0.5s ease-in-out infinite alternate;
            display: none;
        }

        @keyframes brilloLetra {
            0% {
                transform: translate(-50%, -50%) scale(0.8);
                opacity: 0.3;
            }
            100% {
                transform: translate(-50%, -50%) scale(1.5);
                opacity: 0.8;
            }
        }

        .grafico-container {
            width: 94%;
            max-width: 940px;
            position: relative;
            z-index: 2;
            flex-shrink: 0;
            height: 400px;
            display: flex;
            flex-direction: column;
            flex: 1;
            min-height: 280px;
            max-height: 520px;
        }

        .grafico-container .ejes {
            position: relative;
            width: 100%;
            height: 100%;
            min-height: 240px;
            max-height: 460px;
            flex: 1;
            margin-left: 48px;
        }

        .eje-y {
            position: absolute;
            left: -46px;
            top: 0;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            color: #aaa;
            font-size: 9px;
            font-family: 'Segoe UI', monospace;
            letter-spacing: 0.5px;
            text-align: right;
            padding-right: 5px;
            width: 36px;
            text-shadow: 0 0 10px rgba(0, 0, 0, 0.9);
        }
        .eje-y span {
            opacity: 0.7;
        }

        .eje-y-titulo {
            position: absolute;
            left: -50px;
            top: 50%;
            transform: translateY(-50%) rotate(-90deg);
            color: #aaa;
            font-size: 10px;
            letter-spacing: 2px;
            font-family: 'Segoe UI', sans-serif;
            white-space: nowrap;
            opacity: 0.7;
            font-weight: 300;
            text-shadow: 0 0 10px rgba(0, 0, 0, 0.9);
        }

        .barras-wrapper {
            position: absolute;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            gap: 2px;
            padding: 0 2px;
            border-left: 1px solid rgba(255, 255, 255, 0.08);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }

        .barra {
            flex: 1;
            height: 3px;
            min-height: 2px;
            border-radius: 2px 2px 0 0;
            transition: height 0.06s ease, background 0.06s ease;
            background: cyan;
            max-width: 20px;
            will-change: height;
            opacity: 0.85;
        }

        .eje-x {
            display: flex;
            justify-content: space-between;
            padding: 3px 6px 0 6px;
            margin-left: 48px;
            color: #aaa;
            font-size: 8px;
            font-family: 'Segoe UI', monospace;
            letter-spacing: 0.5px;
            text-shadow: 0 0 10px rgba(0, 0, 0, 0.9);
        }
        .eje-x span {
            opacity: 0.7;
        }

        .eje-x-titulo {
            text-align: center;
            color: #aaa;
            font-size: 10px;
            letter-spacing: 2px;
            font-family: 'Segoe UI', sans-serif;
            opacity: 0.7;
            font-weight: 300;
            margin-top: 0px;
            margin-left: 48px;
            text-shadow: 0 0 10px rgba(0, 0, 0, 0.9);
        }

        .info {
            color: #ccc;
            font-size: 13px;
            margin-top: 10px;
            letter-spacing: 2px;
            text-align: center;
            z-index: 2;
            position: relative;
            flex-shrink: 0;
            text-shadow: 0 0 20px rgba(0, 0, 0, 0.9);
        }
        .info strong {
            color: #ff6b6b;
        }

        .tiempo {
            color: #ccc;
            font-size: 13px;
            margin-top: 1px;
            letter-spacing: 1px;
            z-index: 2;
            position: relative;
            flex-shrink: 0;
            text-shadow: 0 0 20px rgba(0, 0, 0, 0.9);
        }

        .controles {
            margin-top: 10px;
            margin-bottom: 10px;
            display: flex;
            gap: 14px;
            align-items: center;
            flex-wrap: wrap;
            justify-content: center;
            z-index: 2;
            position: relative;
            flex-shrink: 0;
        }

        .btn {
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: #ddd;
            padding: 10px 28px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s ease;
            font-family: inherit;
            letter-spacing: 1px;
            z-index: 2;
            touch-action: manipulation;
            min-height: 44px;
            min-width: 44px;
        }

        .btn:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.3);
            transform: scale(1.02);
        }

        .btn:active {
            transform: scale(0.95);
        }

        .btn-primary {
            background: rgba(255, 80, 30, 0.3);
            border-color: rgba(255, 80, 30, 0.4);
            color: #ff6633;
        }

        .btn-primary:hover {
            background: rgba(255, 80, 30, 0.45);
            border-color: rgba(255, 80, 30, 0.6);
        }

        .btn-audio {
            background: rgba(0, 255, 255, 0.2);
            border-color: rgba(0, 255, 255, 0.3);
            color: #00ffff;
            min-width: 54px;
        }

        .btn-audio:hover {
            background: rgba(0, 255, 255, 0.3);
            border-color: rgba(0, 255, 255, 0.5);
        }

        .mensaje-audio {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            color: #d4a0d4;
            font-size: 16px;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            padding: 12px 24px;
            border-radius: 30px;
            border: 1px solid rgba(180, 80, 180, 0.2);
            z-index: 100;
            animation: pulseMensaje 2s ease-in-out infinite;
            display: none;
            text-align: center;
            letter-spacing: 1px;
            pointer-events: none;
        }

        .mensaje-audio.mostrar {
            display: block;
        }

        @keyframes pulseMensaje {
            0%,
            100% {
                opacity: 0.7;
                transform: translateX(-50%) scale(1);
            }
            50% {
                opacity: 1;
                transform: translateX(-50%) scale(1.05);
            }
        }

        .cargando {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #0a0008;
            z-index: 1000;
            color: #d4a0d4;
            font-size: 20px;
            letter-spacing: 3px;
            flex-direction: column;
            gap: 20px;
        }
        .cargando .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(180, 80, 180, 0.1);
            border-top: 3px solid #d4a0d4;
            border-radius: 50%;
            animation: girar 1s linear infinite;
        }
        @keyframes girar {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }
        .cargando.oculto {
            display: none;
        }

        @media (max-width: 768px) {
            .container {
                padding: 4px 10px 6px;
                padding-top: 4px;
            }
            .letra {
                font-size: 16px;
                min-height: 32px;
            }
            .titulo {
                font-size: 12px;
                min-height: 20px;
            }
            .letra-container {
                min-height: 44px;
                padding: 1px 10px 2px;
            }
            .grafico-container {
                height: 300px;
                min-height: 200px;
                max-height: 400px;
            }
            .grafico-container .ejes {
                min-height: 160px;
                max-height: 330px;
                margin-left: 38px;
            }
            .eje-y {
                left: -38px;
                width: 30px;
                font-size: 8px;
            }
            .eje-y-titulo {
                left: -42px;
                font-size: 9px;
            }
            .eje-x {
                margin-left: 38px;
                font-size: 8px;
                padding: 2px 4px 0 4px;
            }
            .eje-x-titulo {
                margin-left: 38px;
                font-size: 9px;
            }
            .barras-wrapper {
                gap: 2px;
                padding: 0 2px;
            }
            .barra {
                max-width: 14px;
                min-height: 2px;
            }
            .btn {
                padding: 8px 20px;
                font-size: 12px;
                min-height: 40px;
                min-width: 40px;
            }
            .controles {
                gap: 10px;
                margin-top: 8px;
                margin-bottom: 6px;
            }
            .info {
                font-size: 12px;
                margin-top: 8px;
            }
            .tiempo {
                font-size: 12px;
                margin-top: 1px;
            }
            .mensaje-audio {
                font-size: 14px;
                padding: 10px 20px;
                bottom: 70px;
            }
        }

        @media (max-width: 480px) {
            .container {
                padding: 2px 6px 4px;
                padding-top: 2px;
            }
            .letra {
                font-size: 13px;
                min-height: 26px;
            }
            .titulo {
                font-size: 10px;
                min-height: 16px;
            }
            .letra-container {
                min-height: 36px;
                padding: 1px 6px 1px;
            }
            .grafico-container {
                height: 200px;
                min-height: 150px;
                max-height: 300px;
            }
            .grafico-container .ejes {
                min-height: 120px;
                max-height: 240px;
                margin-left: 32px;
            }
            .eje-y {
                left: -32px;
                width: 26px;
                font-size: 7px;
            }
            .eje-y-titulo {
                left: -36px;
                font-size: 8px;
            }
            .eje-x {
                margin-left: 32px;
                font-size: 7px;
            }
            .eje-x-titulo {
                margin-left: 32px;
                font-size: 8px;
            }
            .barras-wrapper {
                gap: 2px;
                padding: 0 2px;
            }
            .barra {
                max-width: 10px;
                min-height: 2px;
            }
            .btn {
                padding: 6px 14px;
                font-size: 11px;
                min-height: 36px;
                min-width: 36px;
            }
            .controles {
                gap: 8px;
                margin-top: 6px;
                margin-bottom: 4px;
            }
            .info {
                font-size: 11px;
                margin-top: 6px;
            }
            .mensaje-audio {
                font-size: 12px;
                padding: 8px 16px;
                bottom: 60px;
            }
        }

        ::-webkit-scrollbar {
            width: 0px;
        }
    </style>
</head>
<body>

    <!-- ===== FOTO DE FONDO ===== -->
    <div class="fondo-foto" id="fondoFoto"></div>

    <div class="cargando" id="cargando">
        <div class="spinner"></div>
        <span>🎵 Cargando canción...</span>
    </div>

    <div class="particulas-container" id="particulasContainer"></div>

    <div class="mensaje-audio" id="mensajeAudio">🎵 Toca en cualquier lugar para activar el audio</div>

    <div class="container" id="container">

        <div class="letra-container">
            <div class="titulo" id="titulo">♫ Doma - Josean Log ♫</div>
            <div class="letra" id="letra">
                ❤ De corazones tienes colección ❤
                <div class="brillo" id="brilloLetra"></div>
            </div>
        </div>

        <div class="grafico-container">
            <div class="ejes" id="ejesGrafico">
                <div class="eje-y">
                    <span>1.0</span>
                    <span>0.75</span>
                    <span>0.5</span>
                    <span>0.25</span>
                    <span>0.0</span>
                </div>
                <div class="eje-y-titulo">Intensidad</div>
                <div class="barras-wrapper" id="barrasContainer"></div>
            </div>
            <div class="eje-x">
                <span>0</span>
                <span>10</span>
                <span>20</span>
                <span>30</span>
                <span>40</span>
                <span>50</span>
                <span>60</span>
                <span>70</span>
                <span>80</span>
                <span>90</span>
                <span>100</span>
            </div>
            <div class="eje-x-titulo">Frecuencia</div>
        </div>

        <div class="info">
            ⏱ <strong id="tiempoRestante">99.0</strong>s restantes
        </div>
        <div class="tiempo" id="modoTexto">🎵</div>

        <div class="controles">
            <button class="btn btn-primary" id="btnReiniciar">🔄 Reiniciar</button>
            <button class="btn btn-audio" id="btnAudio">🔊</button>
        </div>

    </div>

    <script>
        // ============================================================
        // CONFIGURACIÓN
        // ============================================================
        const DURACION_TOTAL = 99;
        const INICIO_AUDIO = 80;
        const MODO_EXPLOSIVO = 40;
        const ALTURA_MAXIMA = 160;

        const esTablet = window.innerWidth <= 768;
        const NUM_BARRAS = esTablet ? 50 : 70;

        const LETRAS = [
            { tiempo: 0.0, texto: "❤ De corazones tienes colección ❤" },
            { tiempo: 3.5, texto: " ☼☽ Ya va amanecer ☀︎︎" },
            { tiempo: 7.5, texto: "✰ Y sigo en esta encrucijada ✰" },
            { tiempo: 10.5, texto: "✰ Misterio de mujer ✰" },
            { tiempo: 13.0, texto: "✰ Solo será cuestión de tiempo ✰" },
            { tiempo: 17.0, texto: ".ᐟ.ᐟ Debo interpretar tus gritos, tus llamadas .ᐟ.ᐟ" },
            { tiempo: 22.0, texto: "☔︎︎ Tus caricias entre cortadas ☔︎︎" },
            { tiempo: 26.0, texto: "❤ Y tus arranques de pasión ❤" },
            { tiempo: 31.0, texto: ".ᐟ.ᐟ Debo buscar dentro de tanto desperfecto .ᐟ.ᐟ" },
            { tiempo: 37.5, texto: "☔︎︎ La moraleja de este cuento ☔︎︎" },
            { tiempo: 40.0, texto: "➶➶ DEBO DOMAR TU CORAZÓN ➶➶" },
            { tiempo: 74.0, texto: "⚔️ Y debo enterrar el filo de tu espada ⚔️" },
            { tiempo: 78.0, texto: "🛏️ En los secretos de tu almohada 🛏️" },
            { tiempo: 83.0, texto: "📖 Hasta que entiendas la lección 📖" },
            { tiempo: 87.0, texto: "🌀 Debo llegar al fondo de este desparpajo 🌀" },
            { tiempo: 93.0, texto: "💪 Que yo de esta no me rajo 💪" },
            { tiempo: 95.0, texto: "❤️‍🔥 Hasta domar tu corazón ❤️‍🔥" }
        ];

        // ============================================================
        // DOM
        // ============================================================
        const container = document.getElementById('container');
        const letraEl = document.getElementById('letra');
        const brilloLetra = document.getElementById('brilloLetra');
        const tituloEl = document.getElementById('titulo');
        const tiempoRestanteEl = document.getElementById('tiempoRestante');
        const modoTextoEl = document.getElementById('modoTexto');
        const barrasContainer = document.getElementById('barrasContainer');
        const particulasContainer = document.getElementById('particulasContainer');
        const btnReiniciar = document.getElementById('btnReiniciar');
        const btnAudio = document.getElementById('btnAudio');
        const cargando = document.getElementById('cargando');
        const ejesGrafico = document.getElementById('ejesGrafico');
        const mensajeAudio = document.getElementById('mensajeAudio');
        const fondoFoto = document.getElementById('fondoFoto');

        // ============================================================
        // AUDIO
        // ============================================================
        const audio = new Audio('music/doma.mp3');
        audio.loop = true;
        audio.volume = 0.7;
        let audioListo = false;
        let audioIniciado = false;

        audio.addEventListener('canplaythrough', () => {
            audioListo = true;
            cargando.classList.add('oculto');
            console.log('✅ Audio cargado');
            if (window.innerWidth <= 768) {
                mensajeAudio.classList.add('mostrar');
            }
        });

        audio.addEventListener('error', () => {
            console.warn('⚠️ No se cargó el audio');
            cargando.classList.add('oculto');
        });

        audio.load();

        // ============================================================
        // INICIAR AUDIO
        // ============================================================
        function iniciarAudio() {
            if (audioListo && !audioIniciado) {
                audio.currentTime = INICIO_AUDIO;
                audio.play().then(() => {
                    audioIniciado = true;
                    mensajeAudio.classList.remove('mostrar');
                    console.log('🔊 Audio iniciado');
                }).catch(() => {
                    console.log('⏳ Audio bloqueado, esperando interacción');
                });
            }
        }

        document.addEventListener('click', iniciarAudio);
        document.addEventListener('touchstart', iniciarAudio);

        // ============================================================
        // BOTÓN AUDIO
        // ============================================================
        let audioEncendido = true;

        btnAudio.addEventListener('click', () => {
            if (!audioIniciado) {
                iniciarAudio();
            }
            if (audioIniciado) {
                if (audioEncendido) {
                    audio.pause();
                    audioEncendido = false;
                    btnAudio.textContent = '🔇';
                    pausado = true;
                } else {
                    audio.currentTime = INICIO_AUDIO;
                    audio.play().catch(() => {});
                    audioEncendido = true;
                    btnAudio.textContent = '🔊';
                    pausado = false;
                    if (!tiempoInicio) {
                        tiempoInicio = Date.now();
                    }
                }
            }
        });

        // ============================================================
        // CREAR BARRAS
        // ============================================================
        let barras = [];

        function crearBarras() {
            barrasContainer.innerHTML = '';
            barras = [];
            for (let i = 0; i < NUM_BARRAS; i++) {
                const barra = document.createElement('div');
                barra.className = 'barra';
                barra.style.height = '3px';
                barrasContainer.appendChild(barra);
                barras.push(barra);
            }
        }
        crearBarras();

        // ============================================================
        // GENERAR ONDAS (MODO NORMAL)
        // ============================================================
        function generarOndas(ancho, tiempo) {
            const alturas = new Array(ancho);

            for (let i = 0; i < ancho; i++) {
                const x = i / ancho;

                const onda1 = Math.sin(i * 0.15 + tiempo * 3.0) * 0.35 + 0.5;
                const onda2 = Math.sin(i * 0.25 - tiempo * 2.2 + 1.5) * 0.25 + 0.3;
                const onda3 = Math.sin(i * 0.08 + tiempo * 1.8 + 0.7) * 0.2 + 0.2;

                const dist1 = (x - 0.2 - 0.1 * Math.sin(tiempo * 0.3));
                const pico1 = 0.3 * Math.exp(-dist1 * dist1 * 100);
                const dist2 = (x - 0.5 - 0.1 * Math.cos(tiempo * 0.4));
                const pico2 = 0.3 * Math.exp(-dist2 * dist2 * 100);
                const dist3 = (x - 0.8 - 0.1 * Math.sin(tiempo * 0.5 + 1));
                const pico3 = 0.3 * Math.exp(-dist3 * dist3 * 100);

                const ruido = 0.04 * Math.sin(i * 2.5 + tiempo * 12);

                let altura = onda1 * 0.5 + onda2 * 0.3 + onda3 * 0.2 + pico1 * 0.3 + pico2 * 0.3 + pico3 * 0.3 + ruido;
                altura = Math.max(altura, 0.06);
                altura = Math.min(altura, 1);

                alturas[i] = altura;
            }

            return alturas;
        }

        // ============================================================
        // GENERAR CAOS (MODO EXPLOSIVO)
        // ============================================================
        function generarCaos(ancho, tiempo) {
            const alturas = new Array(ancho);

            for (let i = 0; i < ancho; i++) {
                const x = i / ancho;

                const onda1 = Math.sin(i * 0.12 + tiempo * 4.5) * 0.3 + 0.5;
                const onda2 = Math.sin(i * 0.2 - tiempo * 3.8 + 2.0) * 0.25 + 0.4;
                const onda3 = Math.sin(i * 0.07 + tiempo * 5.2 + 1.0) * 0.3 + 0.3;

                const dist1 = (x - 0.15 - 0.1 * Math.sin(tiempo * 0.7));
                const pico1 = 0.4 * Math.exp(-dist1 * dist1 * 144);
                const dist2 = (x - 0.4 - 0.1 * Math.cos(tiempo * 0.8));
                const pico2 = 0.4 * Math.exp(-dist2 * dist2 * 144);
                const dist3 = (x - 0.65 - 0.1 * Math.sin(tiempo * 0.6 + 1.5));
                const pico3 = 0.4 * Math.exp(-dist3 * dist3 * 144);
                const dist4 = (x - 0.85 - 0.1 * Math.cos(tiempo * 0.5 + 2.0));
                const pico4 = 0.4 * Math.exp(-dist4 * dist4 * 144);

                const ruido = 0.08 * Math.sin(i * 3.0 + tiempo * 18 + x * 20);

                let altura = onda1 * 0.4 + onda2 * 0.3 + onda3 * 0.3;
                altura += pico1 * 0.3 + pico2 * 0.3 + pico3 * 0.3 + pico4 * 0.3;
                altura += ruido;

                const latido = 0.6 + 0.4 * (0.5 + 0.5 * Math.sin(tiempo * 8));
                altura = altura * latido;

                altura = Math.max(altura, 0.05);
                altura = Math.min(altura, 1);

                alturas[i] = altura;
            }

            return alturas;
        }

        // ============================================================
        // COLOR
        // ============================================================
        const colorCache = {};

        function getColor(altura, explosivo) {
            const key = Math.round(altura * 100) + '_' + (explosivo ? '1' : '0');
            if (colorCache[key]) return colorCache[key];

            let color;
            if (explosivo) {
                const r = Math.min(1, 0.5 + altura * 0.6);
                const g = Math.min(1, 0.05 + altura * 0.2);
                const b = Math.min(1, 0.1 + altura * 0.5);
                color = `rgb(${Math.floor(r * 255)},${Math.floor(g * 255)},${Math.floor(b * 255)})`;
            } else {
                const hue = 200 + altura * 160;
                color = `hsl(${hue}, 85%, ${30 + altura * 50}%)`;
            }
            colorCache[key] = color;
            return color;
        }

        // ============================================================
        // PARTÍCULAS
        // ============================================================
        let particulaTimer = 0;

        function crearParticula(x, y, color) {
            const particula = document.createElement('div');
            particula.className = 'particula';
            const size = 3 + Math.random() * 5;
            const angulo = Math.random() * 2 * Math.PI;
            const distancia = 60 + Math.random() * 150;
            const dx = Math.cos(angulo) * distancia;
            const dy = Math.sin(angulo) * distancia - 60;

            particula.style.width = size + 'px';
            particula.style.height = size + 'px';
            particula.style.left = (x - size / 2) + 'px';
            particula.style.top = (y - size / 2) + 'px';
            particula.style.setProperty('--dx', dx + 'px');
            particula.style.setProperty('--dy', dy + 'px');
            particula.style.background = color;
            particula.style.boxShadow = `0 0 ${size * 2}px ${color}`;
            particula.style.animationDuration = (1.5 + Math.random() * 1.5) + 's';

            particulasContainer.appendChild(particula);

            setTimeout(() => {
                if (particula.parentNode) particula.remove();
            }, 3500);
        }

        function explosionParticulas(centroX, centroY, cantidad) {
            const colores = [
                '#ff6633', '#ff4400', '#ff2200', '#cc3300',
                '#ff8844', '#ff5500', '#dd2200', '#ff3300',
                '#aa1155', '#cc2266', '#ff3377', '#881144',
                '#ff7733', '#ee5511', '#cc4411', '#ff6611'
            ];

            for (let i = 0; i < cantidad; i++) {
                const color = colores[Math.floor(Math.random() * colores.length)];
                const x = centroX + (Math.random() - 0.5) * 60;
                const y = centroY + (Math.random() - 0.5) * 60;
                crearParticula(x, y, color);
            }
        }

        // ============================================================
        // ESTADO
        // ============================================================
        let tiempoInicio = 0;
        let reproduciendo = false;
        let animacionId = null;
        let pausado = false;
        let frameCounter = 0;
        let reiniciando = false;

        // ============================================================
        // ACTUALIZAR ANIMACIÓN
        // ============================================================
        function actualizarAnimacion(timestamp) {
            if (!reproduciendo || pausado) {
                animacionId = requestAnimationFrame(actualizarAnimacion);
                return;
            }

            frameCounter++;
            const tiempoActual = (Date.now() - tiempoInicio) / 1000;

            if (tiempoActual > DURACION_TOTAL) {
                tiempoInicio = Date.now();
                if (audio.paused && audioEncendido && audioIniciado) {
                    audio.currentTime = INICIO_AUDIO;
                    audio.play().catch(() => {});
                }
                return;
            }

            const tiempoRestante = Math.max(0, DURACION_TOTAL - tiempoActual);
            const explosivo = tiempoActual >= MODO_EXPLOSIVO;

            // ===== FOTO: MODO EXPLOSIVO SE ACLARA UN POCO =====
            if (explosivo) {
                fondoFoto.classList.add('explosivo');
            } else {
                fondoFoto.classList.remove('explosivo');
            }

            // ===== LETRA =====
            const skipLetra = esTablet ? 3 : 2;
            if (frameCounter % skipLetra === 0 || explosivo) {
                let textoActual = '';
                for (let i = LETRAS.length - 1; i >= 0; i--) {
                    if (tiempoActual >= LETRAS[i].tiempo) {
                        textoActual = LETRAS[i].texto;
                        break;
                    }
                }
                if (letraEl.textContent !== textoActual) {
                    letraEl.textContent = textoActual;
                }

                if (explosivo) {
                    const hue = (tiempoActual * 40 + 20) % 60 + 10;
                    const lig = 50 + 20 * Math.sin(tiempoActual * 5);
                    letraEl.style.color = `hsl(${hue}, 100%, ${lig}%)`;
                    letraEl.style.textShadow =
                        `0 0 30px hsla(${hue}, 100%, 60%, 0.5), 0 0 60px hsla(${hue + 20}, 100%, 50%, 0.3), 0 0 100px rgba(0,0,0,0.9)`;
                    letraEl.style.transform = `scale(${1 + 0.025 * Math.sin(tiempoActual * 8)})`;
                    brilloLetra.style.display = 'block';
                    brilloLetra.style.background =
                        `radial-gradient(circle, hsla(${hue}, 100%, 60%, 0.3), transparent 70%)`;
                    tituloEl.style.color = '#ff6633';
                    tituloEl.style.textShadow = '0 0 30px rgba(255, 80, 30, 0.5), 0 0 60px rgba(0,0,0,0.9)';
                } else {
                    const hue = 180 + (tiempoActual * 30) % 60;
                    letraEl.style.color = `hsl(${hue}, 100%, 70%)`;
                    letraEl.style.textShadow = `0 0 40px hsla(${hue}, 100%, 70%, 0.2), 0 0 80px rgba(0,0,0,0.9)`;
                    letraEl.style.transform = 'scale(1)';
                    brilloLetra.style.display = 'none';
                    tituloEl.style.color = '#00ffff';
                    tituloEl.style.textShadow = '0 0 30px rgba(0, 255, 255, 0.3), 0 0 60px rgba(0,0,0,0.9)';
                }
            }

            // ===== BARRAS =====
            const ejesHeight = ejesGrafico.clientHeight || 300;
            const escala = (ALTURA_MAXIMA / 200) * ejesHeight * 0.85;

            let alturas;
            if (explosivo) {
                alturas = generarCaos(NUM_BARRAS, tiempoActual);
            } else {
                alturas = generarOndas(NUM_BARRAS, tiempoActual);
            }

            for (let i = 0; i < NUM_BARRAS; i++) {
                const altura = alturas[i] || 0.05;
                const barra = barras[i];
                const alturaPx = Math.max(2, altura * escala);
                barra.style.height = alturaPx + 'px';
                barra.style.background = getColor(altura, explosivo);
                if (explosivo && altura > 0.2) {
                    const brillo = 3 + altura * 10;
                    barra.style.boxShadow = `0 0 ${brillo}px ${getColor(altura, true)}`;
                } else {
                    barra.style.boxShadow = 'none';
                }
            }

            // ===== PARTÍCULAS =====
            if (explosivo) {
                const skipParticulas = esTablet ? 6 : 3;
                particulaTimer++;
                if (particulaTimer % skipParticulas === 0) {
                    const ancho = window.innerWidth;
                    const alto = window.innerHeight;
                    const cx = ancho / 2;
                    const cy = alto / 2;
                    const cantidad = esTablet ? 1 + Math.floor(Math.random() * 2) : 1 + Math.floor(Math.random() * 3);
                    const centroX = cx + (Math.random() - 0.5) * 180;
                    const centroY = cy * 0.35 + (Math.random() - 0.5) * 70;
                    explosionParticulas(centroX, centroY, cantidad);
                }
                if (particulaTimer % 40 === 0 && !esTablet) {
                    const cx = window.innerWidth / 2;
                    const cy = window.innerHeight / 2;
                    explosionParticulas(cx, cy * 0.35, 4 + Math.floor(Math.random() * 4));
                }
            }

            // ===== TIEMPO =====
            tiempoRestanteEl.textContent = tiempoRestante.toFixed(1);

            if (explosivo) {
                modoTextoEl.textContent = '🔥';
                modoTextoEl.style.color = '#ff6633';
                modoTextoEl.style.textShadow = '0 0 30px rgba(255, 80, 30, 0.5), 0 0 60px rgba(0,0,0,0.9)';
                modoTextoEl.style.fontSize = '22px';
                tituloEl.textContent = `♫ ${tiempoRestante.toFixed(1)}s ♫  🔥🔥🔥🔥`;
            } else {
                modoTextoEl.textContent = '🎵';
                modoTextoEl.style.color = '#ccc';
                modoTextoEl.style.textShadow = '0 0 20px rgba(0,0,0,0.9)';
                modoTextoEl.style.fontSize = '16px';
                tituloEl.textContent = `♫ ${tiempoRestante.toFixed(1)}s ♫`;
            }

            animacionId = requestAnimationFrame(actualizarAnimacion);
        }

        // ============================================================
        // INICIAR
        // ============================================================
        function iniciar() {
            if (animacionId) {
                cancelAnimationFrame(animacionId);
            }
            tiempoInicio = Date.now();
            reproduciendo = true;
            pausado = false;
            frameCounter = 0;
            particulaTimer = 0;
            reiniciando = false;
            animacionId = requestAnimationFrame(actualizarAnimacion);
        }

        // ============================================================
        // REINICIAR
        // ============================================================
        function reiniciar() {
            if (reiniciando) return;
            reiniciando = true;

            if (animacionId) {
                cancelAnimationFrame(animacionId);
                animacionId = null;
            }

            tiempoInicio = Date.now();
            pausado = false;
            frameCounter = 0;
            particulaTimer = 0;

            if (audioIniciado) {
                audio.currentTime = INICIO_AUDIO;
                if (audioEncendido) {
                    audio.play().catch(() => {});
                }
            }

            container.style.background = 'transparent';
            letraEl.style.color = '#fff';
            letraEl.style.transform = 'scale(1)';
            tituloEl.style.color = '#00ffff';
            tituloEl.style.textShadow = '0 0 30px rgba(0, 255, 255, 0.3), 0 0 60px rgba(0,0,0,0.9)';
            tiempoRestanteEl.textContent = '99.0';
            modoTextoEl.textContent = '🎵';
            modoTextoEl.style.color = '#ccc';
            modoTextoEl.style.textShadow = '0 0 20px rgba(0,0,0,0.9)';
            modoTextoEl.style.fontSize = '16px';
            brilloLetra.style.display = 'none';
            fondoFoto.classList.remove('explosivo');

            particulasContainer.innerHTML = '';

            for (let i = 0; i < NUM_BARRAS; i++) {
                const barra = barras[i];
                barra.style.height = '3px';
                barra.style.background = 'cyan';
                barra.style.boxShadow = 'none';
            }

            reproduciendo = true;
            animacionId = requestAnimationFrame(actualizarAnimacion);

            setTimeout(() => {
                reiniciando = false;
            }, 100);

            console.log('🔄 Reiniciado correctamente');
        }

        // ============================================================
        // BOTÓN REINICIAR
        // ============================================================
        btnReiniciar.addEventListener('click', reiniciar);

        // ============================================================
        // INICIO
        // ============================================================
        console.log('♫ Doma - Josean Log | Visualizador Musical ♫');
        console.log(`🎵 Audio inicia en segundo ${INICIO_AUDIO}`);
        console.log(`📱 Modo tablet: ${esTablet ? 'ACTIVADO' : 'DESACTIVADO'} (${NUM_BARRAS} barras)`);
        console.log('📸 Fondo: image/wiwi.jpeg');
        console.log('🌊 Modo normal: ONDAS FRÍAS');
        console.log('🔥 Modo explosivo: NARANJA-ROJO-PÚRPURA');
        console.log('🔄 Bucle infinito automático');

        iniciar();

        setTimeout(() => {
            if (audioListo && !audioIniciado) {
                iniciarAudio();
            }
        }, 1000);

        window.addEventListener('resize', () => {});
    </script>
